<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUNA — Medicare Agent Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────── */
:root {
  --blue:   #1a56ff;
  --blue-s: rgba(26,86,255,.10);
  --teal:   #0097a7;
  --teal-s: rgba(0,151,167,.10);
  --grn:    #00875a;
  --grn-s:  rgba(0,135,90,.10);
  --pur:    #6741d9;
  --pur-s:  rgba(103,65,217,.10);
  --rose:   #c2185b;
  --rose-s: rgba(194,24,91,.10);
  --amb:    #d97706;
  --amb-s:  rgba(217,119,6,.10);
  --font:   'DM Sans', sans-serif;
  --serif:  'Fraunces', serif;
  --mono:   'JetBrains Mono', monospace;
  --r:      14px;
}

[data-theme="light"] {
  --bg:     #f5f5f7;
  --panel:  #ffffff;
  --border: rgba(0,0,0,.08);
  --border2:rgba(0,0,0,.14);
  --t1:     #0d1117;
  --t2:     #52606d;
  --t3:     #9aa5b4;
  --ink:    rgba(0,0,0,.04);
  --ink2:   rgba(0,0,0,.07);
  --sh:     0 1px 3px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.06);
  --sh-lg:  0 4px 6px rgba(0,0,0,.04),0 16px 48px rgba(0,0,0,.10);
  --nav:    rgba(255,255,255,.82);
}
[data-theme="dark"] {
  --bg:     #0c1017;
  --panel:  #141b26;
  --border: rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.14);
  --t1:     #e8edf5;
  --t2:     #8896b0;
  --t3:     #445170;
  --ink:    rgba(255,255,255,.04);
  --ink2:   rgba(255,255,255,.08);
  --sh:     0 2px 12px rgba(0,0,0,.4);
  --sh-lg:  0 8px 40px rgba(0,0,0,.6);
  --nav:    rgba(12,16,23,.88);
}

*,*::before,*::after { box-sizing:border-box;margin:0;padding:0; }
html,body { background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s; }
::selection { background:rgba(26,86,255,.15); }
::-webkit-scrollbar { width:4px;height:4px; }
::-webkit-scrollbar-thumb { background:var(--border2);border-radius:4px; }

/* ── TOPBAR ───────────────────────────── */
.topbar {
  position:sticky;top:0;z-index:100;
  background:var(--nav);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px) saturate(180%);
  display:flex;align-items:center;padding:0 24px;height:58px;gap:0;
}
.logo {
  display:flex;align-items:center;gap:10px;
  padding-right:20px;border-right:1px solid var(--border);margin-right:16px;
}
.logo-mark {
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),#4f8eff);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 2px 8px rgba(26,86,255,.3);
}
.logo-text { font-family:var(--serif);font-size:16px;font-weight:700;color:var(--t1);letter-spacing:3px; }
.logo-pill {
  display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;
  color:var(--grn);background:var(--grn-s);padding:2px 8px;border-radius:20px;
  border:1px solid rgba(0,135,90,.2);
}
.logo-pill::before { content:'';width:5px;height:5px;border-radius:50%;background:var(--grn);box-shadow:0 0 0 2px rgba(0,135,90,.25);animation:live 2s infinite; }
@keyframes live { 0%,100%{box-shadow:0 0 0 2px rgba(0,135,90,.25)}50%{box-shadow:0 0 0 5px rgba(0,135,90,.08)} }

.topbar-center { flex:1;display:flex;align-items:center;gap:6px; }
.back-btn {
  display:none;align-items:center;gap:7px;padding:6px 14px;
  border-radius:var(--r);background:var(--ink);border:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .14s;
}
.back-btn:hover { background:var(--ink2);color:var(--t1); }
.back-btn.show { display:flex; }
.agent-breadcrumb {
  display:none;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--t1);
}
.agent-breadcrumb.show { display:flex; }

.topbar-end { display:flex;align-items:center;gap:10px;margin-left:auto; }
.theme-btn {
  width:36px;height:36px;border-radius:9px;background:var(--ink);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .14s;
}
.theme-btn:hover { background:var(--ink2); }
.user-chip {
  display:flex;align-items:center;gap:8px;padding:5px 12px;
  border-radius:var(--r);background:var(--ink);border:1px solid var(--border);
}
.uav { width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:13px; }
.uname { font-size:12px;font-weight:700; }
.urole { font-size:10px;color:var(--grn);font-weight:600; }

/* ── VIEWS ────────────────────────────── */
#gridView, #workspaceView { transition:opacity .22s; }
#workspaceView { display:none; }

/* ── GRID VIEW ────────────────────────── */
.grid-wrap { max-width:1100px;margin:0 auto;padding:32px 24px 60px; }
.grid-hero { margin-bottom:32px; }
.grid-hero-sup {
  font-size:11px;font-weight:700;color:var(--t3);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:10px;
}
.grid-hero-title {
  font-family:var(--serif);font-size:28px;font-weight:500;line-height:1.2;
  color:var(--t1);margin-bottom:6px;
}
.grid-hero-title em { font-style:italic;color:var(--blue); }
.grid-hero-sub { font-size:14px;color:var(--t2);line-height:1.5;max-width:520px; }

/* CAT PILLS */
.cat-row { display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px; }
.cat-pill {
  display:flex;align-items:center;gap:6px;padding:8px 18px;
  border-radius:40px;border:1.5px solid var(--border2);
  font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;
  transition:all .16s;background:var(--panel);white-space:nowrap;
}
.cat-pill:hover { border-color:var(--blue);color:var(--blue);background:var(--blue-s); }
.cat-pill.active { background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(26,86,255,.25); }
.cat-pill .cpill-count {
  font-size:10px;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:10px;font-weight:700;
}
.cat-pill:not(.active) .cpill-count { background:var(--ink2);color:var(--t3); }

/* AGENT GRID */
.agents-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;
}
.agent-tile {
  background:var(--panel);border:1.5px solid var(--border);border-radius:18px;
  padding:22px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  box-shadow:var(--sh);
}
.agent-tile::before {
  content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;
  opacity:0;transition:opacity .2s;
}
.agent-tile:hover { transform:translateY(-3px);box-shadow:var(--sh-lg);border-color:var(--border2); }
.agent-tile:hover::before { opacity:1; }
.agent-tile:active { transform:translateY(-1px); }

.tile-ico {
  width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:16px;transition:transform .2s;
}
.agent-tile:hover .tile-ico { transform:scale(1.08); }
.tile-name { font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px; }
.tile-cat { font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px; }
.tile-desc { font-size:12px;color:var(--t2);line-height:1.55; }
.tile-arrow {
  position:absolute;bottom:18px;right:18px;font-size:16px;color:var(--t3);
  transition:all .2s;opacity:0;transform:translateX(-4px);
}
.agent-tile:hover .tile-arrow { opacity:1;transform:translateX(0); }

/* CATEGORY SECTION LABEL */
.cat-section { margin-top:10px;margin-bottom:14px; }
.cat-section-label {
  font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.cat-section-label::after { content:'';flex:1;height:1px;background:var(--border); }

/* ── WORKSPACE VIEW ───────────────────── */
.ws-layout { display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 58px); }
.ws-sidebar {
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.ws-agent-info { padding:22px 20px;border-bottom:1px solid var(--border);flex-shrink:0; }
.ws-ico { width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px; }
.ws-name { font-family:var(--serif);font-size:20px;font-weight:500;color:var(--t1);margin-bottom:3px; }
.ws-cat-badge {
  display:inline-flex;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;margin-bottom:8px;
}
.ws-desc { font-size:12px;color:var(--t2);line-height:1.55; }

.ws-quick { padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0; }
.ws-quick-label { font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px; }
.qchip {
  display:block;width:100%;text-align:left;padding:8px 12px;border-radius:9px;
  background:var(--ink);border:1px solid var(--border);
  font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;
  transition:all .13s;margin-bottom:5px;font-family:var(--font);line-height:1.3;
}
.qchip:hover { background:var(--ink2);color:var(--t1);border-color:var(--border2); }

.ws-info-box { padding:16px 20px;flex:1;overflow-y:auto; }
.info-row { display:flex;gap:8px;margin-bottom:8px;font-size:11px; }
.info-label { font-weight:700;color:var(--t3);width:80px;flex-shrink:0; }
.info-val { color:var(--t2); }

/* MAIN CHAT */
.ws-main { display:flex;flex-direction:column;overflow:hidden; }
.chat-area { flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px; }
.chat-empty { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center; }
.chat-empty-ico { font-size:48px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1)); }
.chat-empty-title { font-family:var(--serif);font-size:20px;font-weight:500;color:var(--t1);margin-bottom:6px; }
.chat-empty-sub { font-size:13px;color:var(--t2);line-height:1.6;max-width:360px; }

.msg { display:flex;gap:10px;animation:msgIn .25s ease; }
.msg.u { flex-direction:row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.mav { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
.mbody { max-width:72%; }
.mbubble {
  padding:13px 16px;border-radius:14px;font-size:13px;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
}
.msg.u .mbubble {
  background:var(--blue);color:#fff;
  border-radius:14px 4px 14px 14px;
  box-shadow:0 2px 8px rgba(26,86,255,.25);
}
.msg.a .mbubble {
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px 14px 14px 14px;box-shadow:var(--sh);color:var(--t1);
}
.mmeta { font-size:10px;color:var(--t3);margin-top:5px;font-weight:500; }
.typing { display:flex;gap:4px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:4px 14px 14px 14px;width:fit-content;box-shadow:var(--sh); }
.tdot { width:6px;height:6px;border-radius:50%;background:var(--t3);animation:td 1.3s ease infinite; }
.tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}
.cursor { display:inline-block;color:var(--blue);font-weight:700;animation:blink 1s steps(1) infinite;margin-left:1px; }
@keyframes blink { 50% { opacity:0; } }

.clear-chat-btn {
  width:100%;padding:8px 12px;border-radius:9px;
  background:transparent;border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;
  transition:all .14s;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.clear-chat-btn:hover { background:var(--rose-s);border-color:var(--rose);color:var(--rose); }

.chat-footer { border-top:1px solid var(--border);padding:16px 20px;background:var(--panel);flex-shrink:0; }
.chat-input-row { display:flex;gap:10px;align-items:flex-end; }
.chat-ta {
  flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 15px;color:var(--t1);font-family:var(--font);font-size:13px;
  resize:none;outline:none;min-height:46px;max-height:120px;transition:all .18s;line-height:1.5;
}
.chat-ta:focus { border-color:rgba(26,86,255,.45);box-shadow:0 0 0 3px rgba(26,86,255,.09); }
.chat-ta::placeholder { color:var(--t3); }
.send-btn {
  width:46px;height:46px;border-radius:12px;background:var(--blue);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;
  color:#fff;flex-shrink:0;transition:all .15s;box-shadow:0 2px 8px rgba(26,86,255,.3);
}
.send-btn:hover:not(:disabled) { background:#0040cc;transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,86,255,.4); }
.send-btn:disabled { opacity:.35;cursor:not-allowed;transform:none; }
.chat-hint { font-size:10px;color:var(--t3);text-align:center;margin-top:8px; }

/* NOTIF */
.notif {
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--panel);border:1px solid var(--border2);border-radius:12px;
  padding:13px 18px;max-width:300px;box-shadow:var(--sh-lg);
  font-size:13px;font-weight:600;color:var(--t1);
  display:none;animation:nIn .3s ease;
}
@keyframes nIn { from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85} }

/* ── UTILS ────────────────────────────── */
.sep { height:1px;background:var(--border);margin:16px 0; }
.hidden { display:none !important; }
</style>
</head>

</div>

let currentCat   = 'all';
let currentAgent = null;
let currentUser  = null;   // ← populated by luna_whoami on load

// ── CRM API base — adjust if LUNA is in a different folder ──
const CRM_BASE = '../luna_api.php';  // relative from /luna/index.html → /luna_api.php

const HIST_KEY = 'luna-history-v1';
const TEAM_KEY   = 'luna-team-config-v1';
const MEMORY_KEY = 'luna-memory-v1';
const MEMORY_MIGRATED_KEY = 'luna-memory-migrated-v1';
const MAX_MSGS_PER_AGENT = 200;

/* ══════════════════════════════════════════
   LUNA MEMORY SYSTEM — Hybrid (CRM + local fallback)
   Memory lives in MySQL via luna_api.php so it
   syncs across devices. localStorage is used as
   offline fallback if CRM is unreachable.
══════════════════════════════════════════ */
let lunaMemory = {
  business_goals:    {},
  remember:          [],
  monthly_snapshots: {},
  session_summaries: {},
  lessons:           [],
};

let memorySource = 'unknown'; // 'crm' | 'local' | 'unknown'

// ── Load from CRM, fallback to localStorage ──────────────
async function loadMemory() {
  // First, try CRM
  if (location.protocol !== 'file:') {
    try {
      const r = await fetch(`${CRM_BASE}?action=luna_memory_get`, {
        signal: (window.AbortSignal && AbortSignal.timeout) ? AbortSignal.timeout(5000) : undefined
      });
      if (r.ok) {
        const d = await r.json();
        if (d.ok && d.data) {
          lunaMemory = {
            business_goals:    d.data.business_goals || {},
            remember:          d.data.remember || [],
            monthly_snapshots: d.data.monthly_snapshots || {},
            session_summaries: d.data.session_summaries || {},
            lessons:           d.data.lessons || [],
          };
          memorySource = 'crm';

          // First-time migration: if localStorage has data but CRM is empty, push it up
          await maybeMigrateLocalToCRM();
          return;
        }
      }
    } catch(e) {
      // CRM unreachable — fall through to local
    }
  }

  // Fallback to localStorage
  try {
    const raw = localStorage.getItem(MEMORY_KEY);
    if (raw) lunaMemory = {...lunaMemory, ...JSON.parse(raw)};
    memorySource = 'local';
  } catch(e) {
    memorySource = 'unknown';
  }
}

// ── Migrate existing localStorage data to CRM (one-time) ──
async function maybeMigrateLocalToCRM() {
  if (localStorage.getItem(MEMORY_MIGRATED_KEY)) return; // already done

  try {
    const raw = localStorage.getItem(MEMORY_KEY);
    if (!raw) {
      // Nothing to migrate
      localStorage.setItem(MEMORY_MIGRATED_KEY, '1');
      return;
    }
    const local = JSON.parse(raw);

    // Also include team config and dismissed alerts in migration
    let teamLocal = {};
    try { teamLocal = JSON.parse(localStorage.getItem(TEAM_KEY) || '{}'); } catch(e) {}

    const payload = {
      business_goals:    local.business_goals    || {},
      remember:          local.remember          || [],
      monthly_snapshots: local.monthly_snapshots || {},
      session_summaries: local.session_summaries || {},
      lessons:           local.lessons           || [],
      team_config:       teamLocal,
    };

    const fd = new FormData();
    fd.append('payload', JSON.stringify(payload));
    const r = await fetch(`${CRM_BASE}?action=luna_memory_bulk_import`, {
      method: 'POST', body: fd
    });
    if (r.ok) {
      const d = await r.json();
      if (d.ok) {
        localStorage.setItem(MEMORY_MIGRATED_KEY, '1');
        console.log(`[Memory] Migrated ${d.data.imported} items from localStorage → CRM`);
        // Reload from CRM to refresh state
        const r2 = await fetch(`${CRM_BASE}?action=luna_memory_get`);
        const d2 = await r2.json();
        if (d2.ok && d2.data) {
          lunaMemory = {
            business_goals:    d2.data.business_goals || {},
            remember:          d2.data.remember || [],
            monthly_snapshots: d2.data.monthly_snapshots || {},
            session_summaries: d2.data.session_summaries || {},
            lessons:           d2.data.lessons || [],
          };
        }
      }
    }
  } catch(e) {
    // Migration failed — will retry next session
    console.warn('[Memory] Migration failed:', e.message);
  }
}

// ── Save: writes to CRM + caches in localStorage ─────────
async function saveMemory() {
  // Always cache locally as backup
  try { localStorage.setItem(MEMORY_KEY, JSON.stringify(lunaMemory)); } catch(e) {}

  // Push individual changes to CRM (but don't block UI)
  // Actual writes happen via setMemory() helper below — saveMemory() is called after
  // local mutations to ensure local cache is current.
}

// ── Granular CRM write helper ────────────────────────────
async function setMemory(type, key, value) {
  if (location.protocol === 'file:' || memorySource === 'local') {
    // Offline mode — only update local state, syncs on next online load
    saveMemory();
    return;
  }
  try {
    const fd = new FormData();
    fd.append('type', type);
    if (key !== null && key !== undefined) fd.append('key', String(key));
    fd.append('value', typeof value === 'string' ? value : JSON.stringify(value));
    await fetch(`${CRM_BASE}?action=luna_memory_set`, { method: 'POST', body: fd });
  } catch(e) {
    // Silent fail — local cache still has it
  }
  saveMemory(); // also cache locally
}

// ── Granular CRM delete helper ───────────────────────────
async function deleteMemory(type, key) {
  if (location.protocol === 'file:') return;
  try {
    const fd = new FormData();
    fd.append('type', type);
    if (key) fd.append('key', String(key));
    await fetch(`${CRM_BASE}?action=luna_memory_delete`, { method: 'POST', body: fd });
  } catch(e) {}
}

function detectRemember(text) {
  const t = text.trim().toLowerCase();
  const prefixes = ['recuerda que ','recuerda ','anota que ','remember '];
  for (const p of prefixes) {
    if (t.startsWith(p)) return text.trim().replace(new RegExp('^'+p,'i'),'').trim();
  }
  return null;
}

function addRememberNote(note) {
  if (!lunaMemory.remember) lunaMemory.remember = [];
  const noteObj = {date:new Date().toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'}),text:note,id:Date.now()};
  lunaMemory.remember.unshift(noteObj);
  if (lunaMemory.remember.length > 50) lunaMemory.remember = lunaMemory.remember.slice(0,50);
  // Push to CRM (returns immediately, syncs in background)
  setMemory('remember', null, noteObj);
}

function detectGoalSave(text) {
  const m = text.match(/\[\[SET_GOAL\|([^\]]+)\]\]/);
  if (!m) return null;
  const params = {};
  m[1].split('|').forEach(p => { const i=p.indexOf('='); if(i>0) params[p.slice(0,i).trim()]=p.slice(i+1).trim(); });
  return params;
}

function detectLessonSave(text) {
  const m = text.match(/\[\[ADD_LESSON\|([^\]]+)\]\]/);
  if (!m) return null;
  return {date:new Date().toLocaleDateString('es',{day:'2-digit',month:'short'}),lesson:m[1],id:Date.now()};
}

async function maybeStoreMonthlySnapshot() {
  const key = new Date().toISOString().slice(0,7);
  if (lunaMemory.monthly_snapshots?.[key]) return;
  try {
    const r = await fetch(`${CRM_BASE}?action=luna_pipeline_summary`);
    const d = await r.json();
    if (d.ok && d.data?.estados) {
      lunaMemory.monthly_snapshots = lunaMemory.monthly_snapshots || {};
      const snap = {...d.data.estados, apps_proceso:d.data.apps_proceso, total:d.data.total_miembros, fecha_snap:new Date().toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})};
      lunaMemory.monthly_snapshots[key] = snap;
      const keys = Object.keys(lunaMemory.monthly_snapshots).sort();
      if (keys.length > 24) keys.slice(0,keys.length-24).forEach(k=>delete lunaMemory.monthly_snapshots[k]);
      // Push to CRM
      setMemory('monthly_snapshot', key, snap);
    }
  } catch(e) {}
}

function storeSessionSummary(agentId, messages) {
  if (!messages || messages.length < 4) return;
  const last = messages.filter(m=>m.role==='assistant').pop();
  if (!last) return;
  const preview = last.content.replace(/<[^>]+>/g,'').replace(/\[\[.*?\]\]/g,'').slice(0,120).trim();
  lunaMemory.session_summaries = lunaMemory.session_summaries || {};
  const summary = {date:new Date().toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'}),msgs:messages.length,preview:preview+(preview.length>=120?'...':'')};
  lunaMemory.session_summaries[agentId] = summary;
  // Push to CRM
  setMemory('session_summary', agentId, summary);
}

function buildMemoryContext(agentId) {
  const parts = [];
  // Agents that should see business goals
  const goalAgents = ['luna_main','comando','analista','config','coach'];
  if (goalAgents.includes(agentId) && Object.keys(lunaMemory.business_goals||{}).length > 0) {
    parts.push('METAS DEL NEGOCIO:\n' + Object.entries(lunaMemory.business_goals).map(([k,v])=>`  ${k}: ${v}`).join('\n'));
  }
  // Agents that should see remember notes
  const personalAgents = ['luna_main','comando','config','coach','retencion','analista','sales_coach','estudio','compliance'];
  if (personalAgents.includes(agentId) && lunaMemory.remember?.length > 0) {
    parts.push('NOTAS QUE ISABEL PIDIÓ RECORDAR:\n' + lunaMemory.remember.slice(0,10).map(n=>`  [${n.date}] ${n.text}`).join('\n'));
  }
  // Agents that benefit from pipeline history
  const snapAgents = ['luna_main','analista','comando','config'];
  if (snapAgents.includes(agentId) && lunaMemory.monthly_snapshots) {
    const snaps = Object.entries(lunaMemory.monthly_snapshots).sort().slice(-3);
    if (snaps.length > 0) {
      parts.push('HISTORIAL DE PIPELINE:\n' + snaps.map(([mes,d])=>`  ${mes}: ACTIVOS=${d.ACTIVO||0} HOT=${d['HOT LEAD']||0} T65=${d.T65||0} TOTAL=${d.total||0}`).join('\n'));
    }
  }
  // Last session summary
  const summary = lunaMemory.session_summaries?.[agentId];
  if (summary) parts.push(`ÚLTIMA SESIÓN [${summary.date}]: "${summary.preview}" (${summary.msgs} mensajes)`);
  // Lessons for analytical agents
  if (['luna_main','comando','analista','sales_coach','retencion'].includes(agentId) && lunaMemory.lessons?.length > 0) {
    parts.push('LECCIONES DEL NEGOCIO:\n' + lunaMemory.lessons.slice(0,5).map(l=>`  [${l.date}] ${l.lesson}`).join('\n'));
  }
  if (parts.length === 0) return '';
  return '\n\nMEMORIA DEL NEGOCIO:\n' + parts.join('\n\n');
}

function getMemoryData() {
  return {ok:true, data:{goals:lunaMemory.business_goals||{}, notes:lunaMemory.remember||[], snapshots:lunaMemory.monthly_snapshots||{}, summaries:lunaMemory.session_summaries||{}, lessons:lunaMemory.lessons||[]}};
}

function loadDismissedAlerts() {
  try {
    const raw = localStorage.getItem(ALERTS_KEY);
    if (raw) dismissedAlerts = JSON.parse(raw) || {};
    // Auto-cleanup: remove dismissals older than 24h
    const now = Date.now();
    for (const k in dismissedAlerts) {
      if (now - dismissedAlerts[k] > 86400000) delete dismissedAlerts[k];
    }
  } catch(e) { dismissedAlerts = {}; }
}

// Merge dismissed alerts from CRM memory (after loadMemory completes)
function mergeDismissedFromCRM() {
  if (lunaMemory && lunaMemory.dismissed_alerts) {
    const now = Date.now();
    for (const [k, v] of Object.entries(lunaMemory.dismissed_alerts)) {
      const ts = typeof v === 'number' ? v : parseInt(v) || 0;
      if (ts && (now - ts <= 86400000)) {
        // CRM version wins if newer
        if (!dismissedAlerts[k] || dismissedAlerts[k] < ts) {
          dismissedAlerts[k] = ts;
        }
      }
    }
    saveDismissedAlerts();
  }
}

function saveDismissedAlerts() {
  try { localStorage.setItem(ALERTS_KEY, JSON.stringify(dismissedAlerts)); }
  catch(e) {}
}

function dismissAlert(ruleKey) {
  dismissedAlerts[ruleKey] = Date.now();
  saveDismissedAlerts();
  // Sync to CRM so dismissals work across devices (iPhone → laptop)
  setMemory('dismissed_alert', ruleKey, Date.now());
  activeAlerts = activeAlerts.filter(a => a.key !== ruleKey);
  renderAlertsBanner();
}

async function checkAllAlerts(force = false) {
  // Cache: don't check more than once every 5 minutes unless forced
  const now = Date.now();
  if (!force && now - alertsLastCheck < 300000) return;
  alertsLastCheck = now;

  // Skip entirely if running locally without server (file:// protocol)
  if (location.protocol === 'file:') {
    activeAlerts = [];
    return;
  }

  // iOS Safari-compatible timeout (AbortSignal.timeout fails on older iOS)
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 8000);

  try {
    const test = await fetch(`${CRM_BASE}?action=luna_full_briefing`, {
      signal: controller.signal
    });
    clearTimeout(timeoutId);

    if (!test.ok) {
      activeAlerts = [];
      return;
    }
    const briefingData = await test.json();
    if (!briefingData.ok || !briefingData.data) {
      activeAlerts = [];
      return;
    }

    alertsLoading = true;
    const results = [];

    for (const [key, rule] of Object.entries(ANTICIPATION_RULES)) {
      if (!rule.enabled) continue;
      if (dismissedAlerts[key]) continue;

      try {
        const result = await rule.check(briefingData);
        if (result) {
          results.push({ key, severity: rule.severity, icon: rule.icon, label: rule.label, ...result });
        }
      } catch(e) {
        // Silent — log only in dev
      }
    }

    const order = { critical: 0, high: 1, medium: 2 };
    results.sort((a, b) => order[a.severity] - order[b.severity]);

    activeAlerts = results;
    alertsLoading = false;
    renderAlertsBanner();

    const gv = document.getElementById('gridView');
    if (gv && gv.style.display !== 'none') {
      renderGrid();
    }
  } catch(e) {
    clearTimeout(timeoutId);
    // Silent fail — no warning shown to user
    activeAlerts = [];
    alertsLoading = false;
  }
}

function renderAlertsBanner() {
  // Only show on luna_main and comando agents
  if (!currentAgent || (currentAgent.id !== 'luna_main' && currentAgent.id !== 'comando')) {
    const existing = document.getElementById('alerts-banner');
    if (existing) existing.remove();
    return;
  }

  const chatArea = document.getElementById('chatArea');
  if (!chatArea) return;

  const existing = document.getElementById('alerts-banner');
  if (existing) existing.remove();

  if (activeAlerts.length === 0) return;

  const sevColors = {
    critical: { bg:'rgba(220,38,38,.06)', border:'#dc2626', icon:'🔴', label:'CRÍTICO' },
    high:     { bg:'rgba(217,119,6,.06)', border:'#d97706', icon:'🟠', label:'ALTA' },
    medium:   { bg:'rgba(82,96,109,.06)', border:'#52606d', icon:'🟡', label:'MEDIA' }
  };

  const banner = document.createElement('div');
  banner.id = 'alerts-banner';
  banner.style.cssText = `
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--sh);
  `;

  let html = `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,rgba(26,86,255,.04),rgba(103,65,217,.04));">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:14px;">⚡</span>
      <span style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);">LUNA detectó ${activeAlerts.length} situación${activeAlerts.length>1?'es':''} que requiere${activeAlerts.length>1?'n':''} atención</span>
    </div>
    <button onclick="checkAllAlerts(true)" style="background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:11px;font-weight:600;">↻ Actualizar</button>
  </div>`;

  activeAlerts.forEach((alert, idx) => {
    const sc = sevColors[alert.severity];
    const isLast = idx === activeAlerts.length - 1;
    html += `<div style="padding:13px 16px;${isLast ? '' : 'border-bottom:1px solid var(--border);'}background:${sc.bg};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;">
        <div style="display:flex;align-items:flex-start;gap:9px;flex:1;">
          <span style="font-size:18px;">${alert.icon}</span>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
              <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:${sc.border};background:${sc.bg};border:1px solid ${sc.border}33;padding:1px 6px;border-radius:10px;">${sc.label}</span>
              <span style="font-size:10px;font-weight:600;color:var(--t3);">${alert.label}</span>
            </div>
            <div style="font-size:13px;font-weight:700;color:var(--t1);line-height:1.4;margin-bottom:3px;">${esc(alert.title)}</div>
            <div style="font-size:11px;color:var(--t2);line-height:1.4;">${esc(alert.detail)}</div>
          </div>
        </div>
        <button onclick="dismissAlert('${alert.key}')" title="Ocultar 24h" style="background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0;line-height:1;flex-shrink:0;">✕</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:27px;">`;

    alert.actions.forEach(a => {
      const escapedPrompt = a.prompt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      html += `<button onclick="alertAction('${escapedPrompt}')" style="background:var(--panel);border:1px solid ${sc.border}44;color:${sc.border};border-radius:8px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);">${a.label}</button>`;
    });

    html += `</div></div>`;
  });

  banner.innerHTML = html;

  // Insert at the TOP of the chat area
  if (chatArea.firstChild) {
    chatArea.insertBefore(banner, chatArea.firstChild);
  } else {
    chatArea.appendChild(banner);
  }
}

function alertAction(prompt) {
  const inp = document.getElementById('chatInput');
  if (inp) {
    inp.value = prompt;
    inp.focus();
    sendMsg();
  }
}

/* ══════════════════════════════════════════
   TEAM CONFIG SYSTEM
   Stores Isabel's custom config for each
   team member. Injected into personal agent
   system prompts dynamically.
══════════════════════════════════════════ */
let teamConfig = {};

function loadTeamConfig() {
  try {
    const raw = localStorage.getItem(TEAM_KEY);
    if (raw) teamConfig = JSON.parse(raw) || {};
  } catch(e) { teamConfig = {}; }
}

function saveTeamConfig() {
  try {
    localStorage.setItem(TEAM_KEY, JSON.stringify(teamConfig));
  } catch(e) { console.warn('saveTeamConfig failed:', e); }
}

// Parse [[SAVE_TEAM|key=val|key2=val2]] command from AI response
function parseTeamSave(text) {
  const m = text.match(/\[\[SAVE_TEAM\|([^\]]+)\]\]/);
  if (!m) return null;
  const params = {};
  m[1].split('|').forEach(p => {
    const idx = p.indexOf('=');
    if (idx > 0) {
      params[p.slice(0,idx).trim()] = p.slice(idx+1).trim();
    }
  });
  return params;
}

// Build team config context for agents that need awareness of team roles
function buildTeamContext(agentId) {
  // Agents that see the whole team configuration
  const teamAwareAgents = ['luna_main','comando','config','retencion','sales_coach','compliance'];
  if (!teamAwareAgents.includes(agentId)) return '';
  if (Object.keys(teamConfig).length === 0) return '';

  let ctx = '\n\nCONFIGURACIÓN DEL EQUIPO (definida por Isabel):\n';
  for (const [k, v] of Object.entries(teamConfig)) {
    ctx += `\n${k.toUpperCase()}:\n`;
    for (const [field, val] of Object.entries(v)) {
      ctx += `  ${field}: ${val}\n`;
    }
  }
  return ctx;
}

// team_config tool — returns current team config for Team Builder agent
async function getTeamConfigData() {
  if (Object.keys(teamConfig).length === 0) {
    return {ok: true, data: {configured: [], message: 'No hay configuración guardada aún. Usa el Team Builder para definir los roles de tu equipo.'}};
  }
  return {ok: true, data: {configured: Object.keys(teamConfig), config: teamConfig}};
}

function saveHistory() {
  try {
    // Trim each agent's history to last MAX_MSGS_PER_AGENT before saving
    const trimmed = {};
    for (const k in history) {
      const msgs = history[k] || [];
      trimmed[k] = msgs.length > MAX_MSGS_PER_AGENT
        ? msgs.slice(-MAX_MSGS_PER_AGENT)
        : msgs;
    }
    localStorage.setItem(HIST_KEY, JSON.stringify(trimmed));
  } catch(e) {
    console.warn('saveHistory failed:', e);
  }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HIST_KEY);
    if (raw) history = JSON.parse(raw) || {};
  } catch(e) {
    console.warn('loadHistory failed:', e);
    history = {};
  }
}

function clearAgentChat() {
  if (!currentAgent) return;
  if (!confirm(`¿Borrar el chat con ${currentAgent.name}? Esta acción no se puede deshacer.`)) return;
  delete history[currentAgent.id];
  saveHistory();

// ── Detect if Claude wants to call a tool ────
// Claude outputs: [[TOOL:toolname|param1=val1|param2=val2]]
// We intercept, execute, and inject the result back.
const TOOL_REGEX = /\[\[TOOL:([a-z_]+)(\|[^\]]+)?\]\]/g;

function parseToolCall(match, toolName, paramsStr) {
  const params = {};
  if (paramsStr) {
    paramsStr.slice(1).split('|').forEach(p => {
      const [k,...v] = p.split('=');
      if (k) params[k.trim()] = v.join('=').trim();
    });
  }
  return {toolName, params};
}

async function executeToolsInText(text, agentId) {
  const allowedTools = AGENT_TOOLS[agentId] || [];
  const toolCalls = [];
  let m;
  const re = /\[\[TOOL:([a-z_]+)(\|[^\]]+)?\]\]/g;
  while ((m = re.exec(text)) !== null) {
    const {toolName, params} = parseToolCall(m[0], m[1], m[2]);
    if (allowedTools.includes(toolName)) {
      toolCalls.push({match: m[0], toolName, params});
    } else {
      toolCalls.push({match: m[0], toolName, blocked: true});
    }
  }
  return toolCalls;
}

    return `

  }).join('');

  // Show typing dots only while waiting for the first chunk (no streaming msg yet)
  const lastMsg = msgs[msgs.length - 1];

  if (awaitingFirstChunk) {

  // Re-render alerts banner if applicable
  if (currentAgent && (currentAgent.id === 'luna_main' || currentAgent.id === 'comando')) {
    renderAlertsBanner();
  }
}

/* ══════════════════════════════════════════
   ESTUDIO CREATIVO — Compliance review antes de copiar
   Todo output de Estudio pasa por luna_review_outbound (hooks
   deterministas de CMS) antes de habilitar el botón "Copiar".
══════════════════════════════════════════ */
async function reviewEstudioOutput(agentId, msg) {
  // Texto limpio (sin marcadores internos) para revisar y copiar
  const clean = (msg.content || '').replace(/\[\[.*?\]\]/g, '').trim();
  msg.cleanText = clean;
  try {
    const fd = new FormData();
    fd.append('action', 'luna_review_outbound');
    fd.append('body', clean);
    const r = await fetch(CRM_BASE, { method:'POST', body:fd });
    const d = await r.json();
    msg.review = (d && d.ok) ? d.data : { flags:[], blocked:false, _err:true };
  } catch(e) {
    // Si el server no responde, no bloqueamos — marcamos revisión no disponible
    msg.review = { flags:[], blocked:false, _err:true };
  }
  saveHistory();
  renderChat();
}

function renderComplianceStrip(m, mi) {
  if (m.role !== 'assistant' || !m.review) return '';
  const r = m.review;
  const flags = r.flags || [];
  const alto  = flags.filter(f => f.sev === 'alto');
  const aviso = flags.filter(f => f.sev === 'aviso');
  let head, color, bg;
  if (r._err) { head = '⚠️ Compliance no disponible — revisa manualmente'; color = 'var(--amb)'; bg = 'var(--amb-s)'; }
  else if (r.blocked) { head = `❌ Compliance: ${alto.length} problema(s) ALTO — corrige antes de publicar`; color = 'var(--rose)'; bg = 'var(--rose-s)'; }
  else if (aviso.length) { head = `⚠️ Compliance: ${aviso.length} aviso(s) — revisa antes de publicar`; color = 'var(--amb)'; bg = 'var(--amb-s)'; }
  else { head = '✅ Compliance: sin observaciones'; color = 'var(--grn)'; bg = 'var(--grn-s)'; }

  const items = flags.map(f =>
    `<div style="font-size:11px;color:var(--t2);margin-top:3px;">${f.sev==='alto'?'🔴':'🟡'} ${esc(f.msg)}</div>`).join('');

  // El botón "Copiar" solo aparece si NO está bloqueado por un flag ALTO
  const copyBtn = r.blocked
    ? `<span style="font-size:10px;color:var(--rose);font-weight:700;">Copiar deshabilitado hasta corregir</span>`
    : `<button onclick="copyEstudio('${currentAgent.id}',${mi})" style="background:var(--panel);border:1px solid ${color}55;color:${color};border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);">📋 Copiar</button>`;

  return `<div style="margin-top:8px;background:${bg};border:1px solid ${color}33;border-radius:10px;padding:9px 12px;">
    <div style="font-size:11px;font-weight:700;color:${color};">${head}</div>
    ${items}
    <div style="margin-top:8px;">${copyBtn}</div>
  </div>`;
}

function copyEstudio(agentId, mi) {
  const msgs = history[agentId] || [];
  const m = msgs[mi];
  if (!m) return;
  const text = m.cleanText || (m.content||'').replace(/\[\[.*?\]\]/g,'').trim();
  navigator.clipboard.writeText(text).then(() => toast('✅ Copiado al portapapeles'))
    .catch(() => toast('No se pudo copiar'));
}

async function sendMsg() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg || loading || !currentAgent) return;
  inp.value = ''; inp.style.height = '46px';

  const a = currentAgent;
  const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  if (!history[a.id]) history[a.id] = [];
  history[a.id].push({role:'user', content:msg, time:now()});
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  saveHistory();
  renderChat();

  const hist = history[a.id].slice(0,-1).map(m => ({role:m.role, content:m.content}));
  const toolCtx   = buildToolContext(a.id);
  const teamCtx   = buildTeamContext(a.id);
  const memCtx    = buildMemoryContext(a.id);
  const fullSystem = a.system
    + (memCtx   ? '\n\n' + memCtx   : '')
    + (teamCtx  ? '\n\n' + teamCtx  : '')
    + (toolCtx  ? '\n\n' + toolCtx  : '');

  // ── Detect "recuerda" before sending ──────────────────
  const rememberNote = detectRemember(msg);
  if (rememberNote) {
    addRememberNote(rememberNote);
  }

  let assistantAdded = false;
  let accumulated = '';

  const appendChunk = (chunk) => {
    accumulated += chunk;
    if (!assistantAdded) {
      history[a.id].push({role:'assistant', content:accumulated, time:now(), streaming:true});
      assistantAdded = true;
      renderChat();
    } else {
      history[a.id][history[a.id].length-1].content = accumulated;
      const bubbles = document.querySelectorAll('#chatArea .msg.a .mbubble');
      const last = bubbles[bubbles.length-1];
      if (last) { last.innerHTML = esc(accumulated); document.getElementById('chatArea').scrollTop = 999999; }
    }
  };

  const streamRequest = async (messages, systemPrompt) => {
    // La API key vive SOLO en el servidor. El browser llama a luna_api.php?action=luna_chat,
    // que reenvía a Anthropic con la key y nos devuelve el mismo stream SSE.
    const res = await fetch(`${CRM_BASE}?action=luna_chat`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      credentials:'same-origin',
      body: JSON.stringify({ system:systemPrompt, messages, max_tokens:1800 })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '', out = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop()||'';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type==='content_block_delta' && evt.delta?.type==='text_delta') {
            appendChunk(evt.delta.text); out += evt.delta.text;
          }
        } catch {}
      }
    }
    return out;
  };

  try {
    // Phase 1 — initial response
    await streamRequest([...hist, {role:'user', content:msg}], fullSystem);
    if (!assistantAdded) history[a.id].push({role:'assistant', content:'(sin respuesta)', time:now()});

    // Phase 2 — detect & execute tools
    const toolCalls = await executeToolsInText(accumulated, a.id);
    if (toolCalls.length > 0) {
      let toolResultsText = '';
      let hasData = false;
      for (const tc of toolCalls) {
        if (tc.blocked) { toolResultsText += `\n[Tool ${tc.toolName} no disponible para este agente]`; continue; }
        history[a.id][history[a.id].length-1].content = accumulated + `\n\n_Consultando CRM: ${tc.toolName}..._`;
        renderChat();
        const result = await callTool(tc.toolName, tc.params);
        hasData = true;
        toolResultsText += `\n[${tc.toolName}]: ${JSON.stringify(result.ok ? result.data : {error: result.error})}`;
      }
      if (hasData) {
        // Phase 3 — synthesize with real data
        history[a.id].pop();
        accumulated = ''; assistantAdded = false;
        await streamRequest([
          ...hist,
          {role:'user', content:msg},
          {role:'assistant', content:'Voy a consultar el CRM para darte datos reales.'},
          {role:'user', content:`Datos reales del CRM:\n${toolResultsText}\n\nAhora responde al usuario con estos datos reales. Interprétalos claramente, no pegues el JSON crudo.`}
        ], fullSystem);
        if (!assistantAdded) history[a.id].push({role:'assistant', content:'(sin datos)', time:now()});
      }
    }

    const last = history[a.id][history[a.id].length-1];
    if (last) last.streaming = false;

    // ── Estudio Creativo: pasa el output por Compliance antes de copiar ──
    if (a.id === 'estudio' && last && last.role === 'assistant' && last.content && last.content.length > 20) {
      reviewEstudioOutput(a.id, last);
    }

    // ── Post-response memory processing ───────────────────
    // Detect [[SET_GOAL|...]] in response
    const goalData = detectGoalSave(accumulated);
    if (goalData) {
      lunaMemory.business_goals = lunaMemory.business_goals || {};
      Object.entries(goalData).forEach(([k,v]) => {
        lunaMemory.business_goals[k] = v;
        setMemory('business_goals', k, v);
      });
    }
    // Detect [[ADD_LESSON|...]] in response
    const lessonData = detectLessonSave(accumulated);
    if (lessonData) {
      lunaMemory.lessons = lunaMemory.lessons || [];
      lunaMemory.lessons.unshift(lessonData);
      if (lunaMemory.lessons.length > 30) lunaMemory.lessons = lunaMemory.lessons.slice(0,30);
      setMemory('lesson', null, lessonData);
    }
    // Store session summary when conversation gets meaningful
    storeSessionSummary(a.id, history[a.id]);
    // Try to store monthly snapshot (only once per month per device)
    maybeStoreMonthlySnapshot();
  } catch(e) {
    const last = history[a.id][history[a.id].length-1];
    if (last && last.role==='assistant') { last.content += `\n\n⚠️ Error: ${e.message}`; last.streaming=false; }
    else history[a.id].push({role:'assistant', content:`⚠️ Error: ${e.message}`, time:now()});
  }

  loading = false;
  document.getElementById('sendBtn').disabled = false;
  saveHistory();
  renderChat();
}

   UTILS
══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   PLAN EXECUTION SYSTEM
   Handles [[PLAN_START]] approve/reject flow
══════════════════════════════════════════ */
async function executePlan(planId) {
  const steps = (window._plans || {})[planId];
  if (!steps || !currentAgent) return;

  const writes = steps.filter(s => s.tipo === 'WRITE');
  if (writes.length === 0) return;

  // Disable buttons
  document.querySelectorAll(`button[onclick*="${planId}"]`).forEach(b => {
    b.disabled = true; b.style.opacity = '.5';
  });

  const results = [];
  for (const step of writes) {
    try {
      // Parse params string "key=val&key2=val2"
      const params = {};
      if (step.params) {
        step.params.split('&').forEach(p => {
          const [k, ...v] = p.split('=');
          if (k) params[decodeURIComponent(k)] = decodeURIComponent(v.join('='));
        });
      }
      const result = await callTool(step.tool, params);
      results.push({step: step.label, ok: result.ok, msg: result.ok ? (result.data?.message || 'Ejecutado') : result.error});
    } catch(e) {
      results.push({step: step.label, ok: false, msg: e.message});
    }
  }

  // Add execution summary to chat
  const a = currentAgent;
  const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const summary = '✅ **Plan ejecutado:**\n' + results.map(r =>
    `${r.ok ? '✓' : '✗'} ${r.step}: ${r.msg}`
  ).join('\n');
  history[a.id].push({role:'assistant', content: summary, time: now()});
  saveHistory();
  renderChat();
  delete (window._plans || {})[planId];
}

function cancelPlan(planId) {
  delete (window._plans || {})[planId];
  const a = currentAgent;
  if (!a) return;
  const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  history[a.id].push({role:'assistant', content:'Plan cancelado. ¿Quieres modificar algo?', time: now()});
  saveHistory();
  renderChat();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Render bubble content — basic markdown: **bold**, `code`, and tool call placeholders hidden
// Parse a [[PLAN_START]]...[[PLAN_END]] block into steps
function parsePlan(text) {
  const m = text.match(/\[\[PLAN_START\]\]([\s\S]*?)\[\[PLAN_END\]\]/);
  if (!m) return null;
  const lines = m[1].trim().split('\n').filter(l => l.trim().startsWith('PASO'));
  return lines.map(line => {
    const [label, ...rest] = line.replace(/^PASO \d+:\s*/, '').split(' | ');
    const meta = {};
    rest.forEach(r => {
      const [k, v] = r.split(': ');
      if (k && v) meta[k.trim().toLowerCase()] = v.trim();
    });
    return {label: label.trim(), tipo: meta.tipo || 'READ', tool: meta.tool || '', params: meta.params || ''};
  });
}

function renderBubble(text, streaming = false) {
  // Handle SAVE_TEAM command
  if (text.includes('[[SAVE_TEAM|')) {
    const params = parseTeamSave(text);
    if (params && params.nombre) {
      const key = params.nombre.toLowerCase().trim();
      teamConfig[key] = {nombre:params.nombre||'',rol:params.rol||'',prioridades:params.prioridades||'',puede_sola:params.puede_sola||'',necesita_aprobacion:params.necesita_aprobacion||'',compliance:params.compliance||'',recordatorios:params.recordatorios||'',notas_especiales:params.notas_especiales||''};
      saveTeamConfig();
      const clean = text.replace(/\[\[SAVE_TEAM\|[^\]]+\]\]/g,'');
      let s = esc(clean.trim()).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      return s + `<div style="margin:10px 0;background:rgba(0,135,90,.08);border:1px solid rgba(0,135,90,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--grn);">✅ <strong>Asistente de ${params.nombre} actualizado.</strong><br>Los cambios son inmediatos.<small style="opacity:.7"> Guardado localmente.</small></div>` + (streaming?'<span class="cursor">▍</span>':'');
    }
  }

  // Handle SET_GOAL command
  if (text.includes('[[SET_GOAL|')) {
    const goalData = detectGoalSave(text);
    if (goalData) {
      lunaMemory.business_goals = lunaMemory.business_goals || {};
      Object.entries(goalData).forEach(([k,v]) => {
        lunaMemory.business_goals[k] = v;
        setMemory('business_goals', k, v);
      });
      const clean = text.replace(/\[\[SET_GOAL\|[^\]]+\]\]/g,'');
      let s = esc(clean.trim()).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      const goalList = Object.entries(goalData).map(([k,v])=>`${k}: ${v}`).join(', ');
      return s + `<div style="margin:10px 0;background:rgba(26,86,255,.06);border:1px solid rgba(26,86,255,.15);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--blue);">📌 <strong>Meta guardada en memoria:</strong> ${goalList}<small style="display:block;opacity:.6;margin-top:3px">Permanece entre sesiones. LUNA la usará en todos los análisis.</small></div>` + (streaming?'<span class="cursor">▍</span>':'');
    }
  }

  // Handle ADD_LESSON command
  if (text.includes('[[ADD_LESSON|')) {
    const lessonData = detectLessonSave(text);
    if (lessonData) {
      lunaMemory.lessons = lunaMemory.lessons || [];
      lunaMemory.lessons.unshift(lessonData);
      if (lunaMemory.lessons.length > 30) lunaMemory.lessons = lunaMemory.lessons.slice(0,30);
      setMemory('lesson', null, lessonData);
      const clean = text.replace(/\[\[ADD_LESSON\|[^\]]+\]\]/g,'');
      let s = esc(clean.trim()).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      return s + `<div style="margin:10px 0;background:rgba(103,65,217,.06);border:1px solid rgba(103,65,217,.15);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--pur);">💡 <strong>Lección guardada:</strong> ${lessonData.lesson}<small style="display:block;opacity:.6;margin-top:3px">LUNA la usará para dar mejores recomendaciones.</small></div>` + (streaming?'<span class="cursor">▍</span>':'');
    }
  }

  // Handle PLAN blocks — replace with interactive UI
  if (text.includes('[[PLAN_START]]') && text.includes('[[PLAN_END]]')) {
    const steps = parsePlan(text);
    const pre  = text.split('[[PLAN_START]]')[0];
    const post = text.split('[[PLAN_END]]')[1] || '';
    const writes = steps ? steps.filter(s => s.tipo === 'WRITE') : [];
    const planId = 'plan_' + Date.now();

    let planHtml = '';
    if (steps && steps.length > 0) {
      planHtml = `<div style="margin:10px 0;background:var(--ink);border:1px solid var(--border2);border-radius:12px;overflow:hidden;">
        <div style="padding:10px 14px;background:rgba(26,86,255,.07);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase;">📋 Plan de ejecución</div>
        <div style="padding:10px 14px;">` +
        steps.map((s,i) => {
          const icon = s.tipo === 'WRITE' ? '✏️' : '📖';
          const color = s.tipo === 'WRITE' ? 'var(--amb)' : 'var(--grn)';
          return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;">
            <span style="font-size:10px;font-weight:900;color:${color};width:14px;">${icon}</span>
            <span style="color:var(--t2);">${s.label}</span>
            <span style="margin-left:auto;font-size:9px;font-weight:700;color:${color};background:${s.tipo==='WRITE'?'rgba(217,119,6,.10)':'rgba(0,135,90,.10)'};padding:1px 7px;border-radius:10px;">${s.tipo}</span>
          </div>`;
        }).join('') +
        `</div>` +
        (writes.length > 0 && !streaming ? `<div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;">
          <button onclick="executePlan('${planId}')" style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);">
            ✓ Ejecutar ${writes.length} acción${writes.length>1?'es':''}
          </button>
          <button onclick="cancelPlan('${planId}')" style="background:var(--ink);color:var(--t2);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);">
            ✕ Cancelar
          </button>
        </div>` : '') +
        `</div>`;
      // Store plan steps for execution
      window._plans = window._plans || {};
      if (steps) window._plans[planId] = steps;
    }

    let s = esc(pre.trim());
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
    const postS = esc(post.trim()).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return s + planHtml + (postS ? '<br><br>' + postS : '') + (streaming ? '<span class="cursor">▍</span>' : '');
  }

  // Standard bubble
  let s = esc(text);
  s = s.replace(/\[\[TOOL:[^\]]+\]\]/g, '<span style="opacity:.4;font-size:10px;font-style:italic">[consultando CRM...]</span>');
  s = s.replace(/\[\[PLAN_START\]\][\s\S]*?\[\[PLAN_END\]\]/g, '');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
  if (streaming) s += '<span class="cursor">▍</span>';
  return s;
}
let nt;
function toast(m) {
  const n = document.getElementById('notif');
  n.textContent = m; n.style.display = 'block';
  clearTimeout(nt); nt = setTimeout(()=>n.style.display='none', 3000);
}

// Auto-resize textarea
document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = '46px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('chatInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Inject accent bar CSS for each agent (data-id is now set at render time)
const styleEl = document.createElement('style');
styleEl.textContent = AGENTS.map(a =>
  `.agent-tile[data-id="${a.id}"]::before { background: ${a.color}; }`
).join('\n');
document.head.appendChild(styleEl);

// INIT
loadHistory();
loadTeamConfig();
loadDismissedAlerts();
renderGrid();
initCurrentUser();

// Memory loads async (CRM fetch), then triggers snapshot + alerts
(async () => {
  await loadMemory();
  // Merge CRM-stored dismissed alerts with local
  mergeDismissedFromCRM();
  // After memory is loaded (from CRM or local fallback), continue init
  maybeStoreMonthlySnapshot();
  checkAllAlerts(false);
  // Re-render grid in case team config changed how it displays
  renderGrid();
})();
</script>
