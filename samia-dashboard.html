<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAMIA — Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F7F3EC;--surface:#FAF8F4;--white:#FFFFFF;
  --border:#E8E0D0;--border-d:#D4C9B5;
  --gold:#C9A96E;--gold-lt:#F0E6D0;--gold-dk:#A07840;
  --gold-g:linear-gradient(135deg,#C9A96E,#E8C98E 50%,#C9A96E);
  --teal:#4A7B9D;--teal-lt:#EBF3F8;--teal-dk:#2E5F7A;
  --red:#C0392B;--red-lt:#FDEDEB;
  --green:#2E7D55;--green-lt:#EAF5EE;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --purple:#7B5EA7;--purple-lt:#F0EBF8;
  --text:#2C2416;--text-mid:#5C4A30;--text-muted:#8C7A60;
  --sh:0 1px 10px rgba(44,36,22,.07);--sh2:0 4px 24px rgba(44,36,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:3px}

.topbar{background:var(--white);border-bottom:1.5px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:300;height:60px;display:flex;align-items:center;padding:0 22px;gap:14px;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:var(--gold-g);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:#fff;font-size:20px;font-weight:500}
.logo-txt b{font-family:'Fraunces',serif;font-weight:500;font-size:18px;display:block;line-height:1}
.logo-txt span{font-size:11px;color:var(--text-muted);letter-spacing:.5px}
.topbar-status{margin-left:auto;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted)}
.dot.on{background:var(--green)}.dot.off{background:var(--red)}

.layout{display:flex;padding-top:60px;min-height:100vh}
.nav{width:210px;flex-shrink:0;border-right:1.5px solid var(--border);background:var(--white);position:fixed;top:60px;bottom:0;padding:16px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;cursor:pointer;color:var(--text-mid);font-weight:500;font-size:14px;margin-bottom:3px;transition:.15s;border:1.5px solid transparent}
.nav-item:hover{background:var(--surface)}
.nav-item.active{background:var(--gold-lt);color:var(--gold-dk);border-color:var(--gold)}
.nav-item .ic{font-size:17px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:9px;min-width:18px;text-align:center}
.nav-badge.muted{background:var(--border-d);color:var(--text-mid)}

.main{margin-left:210px;flex:1;padding:26px 30px;max-width:1000px}
.page-head{margin-bottom:20px}
.page-head h1{font-family:'Fraunces',serif;font-weight:400;font-size:26px}
.page-head p{color:var(--text-muted);font-size:13px;margin-top:3px}

.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-family:'Fraunces',serif;font-size:15px}
.card-body{padding:18px}
.row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .nm{font-weight:600;font-size:14px}
.row .sub{font-size:12.5px;color:var(--text-muted);margin-top:2px;line-height:1.45}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:9px;padding:9px 16px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.btn-gold{background:var(--gold-g);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.3)}
.btn-gold:hover{transform:translateY(-1px)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-dk)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--border);color:var(--text-mid)}
.btn-ghost:hover{border-color:var(--gold);background:var(--gold-lt)}
.btn-sm{font-size:11.5px;padding:6px 12px;border-radius:7px}
.btn:disabled{opacity:.5;cursor:default;transform:none}

.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border-d);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
.pill.alto{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.pill.aviso{background:var(--amber-lt);border-color:var(--amber);color:var(--amber)}
.pill.info{background:var(--teal-lt);border-color:var(--teal);color:var(--teal-dk)}
.pill.block{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.pill.warn{background:var(--amber-lt);border-color:var(--amber);color:var(--amber)}
.pill.ok{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.pill.calendar{background:var(--purple-lt);border-color:var(--purple);color:var(--purple)}
.pill.gold{background:var(--gold-lt);border-color:var(--gold);color:var(--gold-dk)}

.brief{font-family:'DM Mono',monospace;font-size:13.5px;line-height:1.7;white-space:pre-wrap;color:var(--text-mid)}
.empty{text-align:center;color:var(--text-muted);padding:34px 10px;font-size:13.5px}
.empty .big{font-size:30px;display:block;margin-bottom:8px;opacity:.5}
textarea,input{font-family:inherit;font-size:14px;width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;background:var(--surface);color:var(--text);resize:vertical}
textarea:focus,input:focus{outline:none;border-color:var(--gold)}
.muted{color:var(--text-muted);font-size:12.5px}
.flag{background:var(--surface);border:1px solid var(--border);border-left-width:4px;border-radius:8px;padding:10px 13px;margin-bottom:9px}
.flag.block{border-left-color:var(--red)}.flag.warn{border-left-color:var(--amber)}
.flag .ft{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.flag .fmatch{font-family:'DM Mono',monospace;font-size:12px;background:var(--white);border:1px solid var(--border);border-radius:5px;padding:1px 6px;color:var(--red)}
.flag .ffix{font-size:12.5px;color:var(--text-mid);margin-top:5px}
.verdict{border-radius:11px;padding:13px 16px;margin-bottom:14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px}
.verdict.ok{background:var(--green-lt);color:var(--green)}
.verdict.review{background:var(--amber-lt);color:var(--amber)}
.verdict.block,.verdict.override{background:var(--red-lt);color:var(--red)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--border-d);border-top-color:var(--gold-dk);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toolbar{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.kv{display:flex;gap:6px;font-size:12.5px;margin:3px 0}
.kv b{color:var(--text-mid);min-width:130px;display:inline-block}
.hidden{display:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">S</div>
    <div class="logo-txt"><b>SAMIA</b><span>Panel del equipo</span></div>
  </div>
  <div class="topbar-status">
    <span class="pill" id="scoreChip" style="display:none;cursor:pointer"></span>
    <span class="dot" id="healthDot"></span><span id="healthTxt">conectando…</span>
  </div>
</div>
<div class="layout">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>

<script>
const API = '';
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function api(path, opts){
  const r = await fetch(API+path, opts);
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error || ('HTTP '+r.status));
  return r.json();
}
const fmtDate = iso => iso ? new Date(iso).toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

const SECTIONS = [
  {id:'briefing', ic:'☀️', label:'Briefing', render:renderBriefing},
  {id:'senales', ic:'📡', label:'Señales', render:renderSignals},
  {id:'compromisos', ic:'📌', label:'Compromisos', render:renderCommitments},
  {id:'memoria', ic:'🧠', label:'Memoria', render:renderMemory},
  {id:'cumplimiento', ic:'🛡️', label:'Cumplimiento', render:renderCompliance},
  {id:'skills', ic:'📘', label:'Skills', render:renderSkills},
  {id:'crecimiento', ic:'🚀', label:'Crecimiento', render:renderGrowth},
  {id:'sistema', ic:'⚙️', label:'Sistema', render:renderSystem},
];
let current = location.hash.slice(1) || 'briefing';
const badges = {};

function buildNav(){
  $('#nav').innerHTML = SECTIONS.map(s=>`
    <div class="nav-item ${s.id===current?'active':''}" data-id="${s.id}">
      <span class="ic">${s.ic}</span><span>${s.label}</span>
      <span class="nav-badge muted hidden" id="badge-${s.id}"></span>
    </div>`).join('');
  $('#nav').querySelectorAll('.nav-item').forEach(el=>el.onclick=()=>go(el.dataset.id));
}
function go(id){
  current = id; location.hash = id;
  $('#nav').querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.id===id));
  const s = SECTIONS.find(x=>x.id===id);
  $('#main').innerHTML = `<div class="page-head"><h1>${s.label}</h1></div><div class="empty"><span class="spin"></span></div>`;
  s.render().catch(e=>{ $('#main').innerHTML = `<div class="page-head"><h1>${s.label}</h1></div><div class="card"><div class="card-body" style="color:var(--red)">⚠️ ${esc(e.message)}</div></div>`; });
}
function setBadge(id, n, kind){
  const el = $('#badge-'+id); if(!el) return;
  if(!n){ el.classList.add('hidden'); return; }
  el.textContent = n; el.classList.remove('hidden');
  el.className = 'nav-badge'+(kind==='muted'?' muted':'');
}
function head(title, sub){ return `<div class="page-head"><h1>${title}</h1>${sub?`<p>${sub}</p>`:''}</div>`; }
function empty(icon, txt){ return `<div class="empty"><span class="big">${icon}</span>${txt}</div>`; }

// ── BRIEFING ──
const HEALTH_COLOR = {autopilot:'var(--green)', revisa:'var(--amber)', necesita:'var(--red)'};
async function renderBriefing(){
  const [{briefing},{health}] = await Promise.all([api('/api/intel/briefing'), api('/api/intel/health')]);
  const col = HEALTH_COLOR[health.band]||'var(--text-muted)';
  const comps = health.components.map(c=>`<div class="kv"><b>${esc(c.name)}</b><span style="min-width:46px">${c.score}/${c.max}</span><span class="muted">${esc(c.note)}</span></div>`).join('');
  const healthCard = `<div class="card" style="border-color:${col}">
    <div class="card-body" style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
      <div style="text-align:center;min-width:96px">
        <div style="font-family:'Fraunces',serif;font-size:44px;line-height:1;color:${col}">${health.score}</div>
        <div class="muted" style="margin-top:2px">de 100</div>
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-weight:600;font-size:15px;color:${col}">${esc(health.headline)}</div>
        <div style="margin-top:8px">${comps}</div>
      </div>
    </div>
    <div class="card-body" style="border-top:1px solid var(--border);background:var(--surface)">
      <div class="muted" style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px">🎯 El foco de hoy</div>
      <div style="font-weight:600">${esc(health.focus.title)}</div>
      <div class="sub" style="color:var(--text-muted);font-size:12.5px;margin-top:2px">${esc(health.focus.why)}</div>
      <div style="margin-top:6px;font-size:13px">→ <b>Ciérralo hoy:</b> ${esc(health.focus.doToday)}</div>
    </div></div>`;
  $('#main').innerHTML = head('Briefing matutino', briefing?`Generado ${fmtDate(briefing.ts)}`:'')
    + healthCard
    + `<div class="toolbar"><button class="btn btn-gold btn-sm" id="regen">↻ Regenerar</button></div>`
    + `<div class="card"><div class="card-body"><div class="brief">${esc(briefing?.text||'Sin briefing.')}</div></div></div>`;
  $('#regen').onclick = async (e)=>{ e.target.disabled=true; await api('/api/intel/briefing',{method:'POST'}); go('briefing'); };
}

// ── SEÑALES ──
async function renderSignals(){
  const {signals=[], computedAt} = await api('/api/intel/signals');
  setBadge('senales', signals.filter(s=>s.severity==='alto').length, '');
  const body = signals.length ? signals.map(s=>`
    <div class="row"><div class="grow">
      <div class="nm">${esc(s.title)} <span class="pill ${s.severity}">${s.severity}</span> <span class="pill ${s.type}">${s.type}</span></div>
      <div class="sub">${esc(s.detail)}</div>
    </div></div>`).join('') : empty('📡','Sin señales activas.');
  $('#main').innerHTML = head('Señales', computedAt?`Computadas ${fmtDate(computedAt)}`:'')
    + `<div class="toolbar"><button class="btn btn-ghost btn-sm" id="refresh">↻ Recomputar</button></div>`
    + `<div class="card"><div class="card-body" style="padding:6px 18px">${body}</div></div>`;
  $('#refresh').onclick = async ()=>{ await api('/api/intel/signals/refresh',{method:'POST'}); go('senales'); };
}

// ── COMPROMISOS ──
async function renderCommitments(){
  const {commitments=[]} = await api('/api/intel/commitments');
  const open = commitments.filter(c=>c.status!=='done');
  setBadge('compromisos', open.filter(c=>c.status==='overdue').length, '');
  const sev = c => c.status==='overdue'?'alto':(c.status==='done'?'ok':'info');
  const body = commitments.length ? commitments.slice().sort((a,b)=>(a.due||'9')<(b.due||'9')?-1:1).map(c=>`
    <div class="row"><div class="grow">
      <div class="nm">${c.entity?esc(c.entity)+' — ':''}${esc(c.text)}</div>
      <div class="sub">
        <span class="pill ${sev(c)}">${c.status}</span>
        <span class="pill gold">${c.who}</span>
        ${c.dueText?`vence: ${esc(c.dueText)} (${c.due})`:'sin fecha'}
      </div>
    </div>${c.status!=='done'?`<button class="btn btn-ghost btn-sm" data-done="${c.id}">✓ Hecho</button>`:''}</div>`).join('')
    : empty('📌','Sin compromisos registrados.');
  $('#main').innerHTML = head('Compromisos', 'Promesas detectadas, con fecha y estado.')
    + `<div class="card"><div class="card-body" style="padding:6px 18px">${body}</div></div>`;
  $('#main').querySelectorAll('[data-done]').forEach(b=>b.onclick=async()=>{
    b.disabled=true; await api('/api/intel/commitments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:b.dataset.done,status:'done'})}); go('compromisos');
  });
}

// ── MEMORIA ──
async function renderMemory(){
  const [{entities=[]},{gaps=[]},{candidates=[]}] = await Promise.all([
    api('/api/memory/entities'), api('/api/memory/gaps'), api('/api/memory/merge-candidates')
  ]);
  setBadge('memoria', candidates.length, 'muted');
  const candBlock = candidates.length ? `<div class="card"><div class="card-head"><span class="card-title">🔀 Posibles duplicados — requieren confirmación</span></div><div class="card-body" style="padding:6px 18px">`
    + candidates.map(c=>`<div class="row"><div class="grow"><div class="nm">${esc(c.aName)} ≟ ${esc(c.bName)}</div><div class="sub">¿La misma persona? Fundir es irreversible.</div></div>
        <button class="btn btn-teal btn-sm" data-into="${c.a}" data-from="${c.b}">Fundir →</button></div>`).join('')
    + `</div></div>` : '';
  const entBlock = entities.length ? entities.map(e=>{
    const a=e.attrs||{};
    const tags=[a.plan,a.medicalGroup,a.mediCal,a.doctor?'Dr. '+a.doctor:null,...(a.conditions||[])].filter(Boolean);
    return `<div class="row"><div class="grow">
      <div class="nm">${esc(e.canonicalName)} ${(e.aliases||[]).length?`<span class="muted">(${e.aliases.map(esc).join(', ')})</span>`:''}</div>
      <div class="sub">${tags.map(t=>`<span class="pill gold">${esc(t)}</span>`).join(' ')} ${(e.gaps||[]).length?`<span class="pill aviso">${e.gaps.length} hueco(s)</span>`:''}</div>
    </div><span class="muted">sal ${e.salience||0}</span></div>`;
  }).join('') : empty('🧠','Memoria vacía. Las personas se capturan solas al chatear.');
  const gapBlock = gaps.length ? `<div class="card"><div class="card-head"><span class="card-title">❓ Known unknowns (top)</span></div><div class="card-body" style="padding:6px 18px">`
    + gaps.map(g=>`<div class="row"><div class="grow"><div class="nm" style="font-weight:500">${esc(g.entity)}</div><div class="sub">${esc(g.what)}</div></div></div>`).join('')+`</div></div>` : '';
  $('#main').innerHTML = head('Memoria', `${entities.length} persona(s) · ${gaps.length} hueco(s)`)
    + `<div class="toolbar"><input id="q" placeholder="Buscar persona…" style="max-width:280px"></div>`
    + candBlock
    + `<div class="card"><div class="card-head"><span class="card-title">👤 Personas</span></div><div class="card-body" style="padding:6px 18px" id="entList">${entBlock}</div></div>`
    + gapBlock;
  $('#q').oninput = debounce(async (e)=>{
    const {entities=[]} = await api('/api/memory/entities?q='+encodeURIComponent(e.target.value));
    $('#entList').innerHTML = entities.length?entities.map(en=>`<div class="row"><div class="grow"><div class="nm">${esc(en.canonicalName)}</div></div></div>`).join(''):empty('🔍','Sin resultados.');
  },250);
  $('#main').querySelectorAll('[data-into]').forEach(b=>b.onclick=async()=>{
    if(!confirm('¿Fundir estas dos personas? No se puede deshacer.'))return;
    b.disabled=true; await api('/api/memory/merge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({into:b.dataset.into,from:b.dataset.from})}); go('memoria');
  });
}

// ── CUMPLIMIENTO ──
async function renderCompliance(){
  $('#main').innerHTML = head('Cumplimiento', 'Revisa lo que vas a decir o enviar al miembro ANTES de usarlo.')
    + `<div class="card"><div class="card-body">
        <textarea id="draft" rows="5" placeholder="Pega aquí el script, mensaje o carta dirigida al miembro…"></textarea>
        <div class="toolbar" style="margin-top:12px">
          <button class="btn btn-gold btn-sm" id="check">🛡️ Revisar</button>
          <label class="muted" style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="wantRewrite" style="width:auto"> sugerir reescritura compliant</label>
        </div>
      </div></div>
      <div id="result"></div>`;
  $('#check').onclick = async (e)=>{
    const text = $('#draft').value.trim(); if(!text)return;
    e.target.disabled=true; $('#result').innerHTML=`<div class="empty"><span class="spin"></span></div>`;
    try{
      const r = await api('/api/security/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,rewrite:$('#wantRewrite').checked})});
      renderVerdict(r, text);
    }catch(err){ $('#result').innerHTML=`<div class="card"><div class="card-body" style="color:var(--red)">⚠️ ${esc(err.message)}</div></div>`; }
    e.target.disabled=false;
  };
}
function renderVerdict(r, text){
  const labels={pass:'✅ Limpio — puede usarse',review:'⚠️ Revisar antes de usar',block:'🚫 Bloqueado por CMS',override:'🚫 Bloqueado'};
  let html = `<div class="verdict ${r.status}">${labels[r.status]||r.status} <span class="pill ${r.level}" style="margin-left:auto">${r.level}</span></div>`;
  if(r.flags?.length){
    html += `<div class="card"><div class="card-head"><span class="card-title">Hallazgos</span></div><div class="card-body">`
      + r.flags.map(f=>`<div class="flag ${f.severity}"><div class="ft"><span class="pill ${f.severity}">${f.severity}</span> ${esc(f.label)} <span class="fmatch">${esc(f.match)}</span></div><div class="ffix">→ ${esc(f.fix)}</div></div>`).join('')
      + `</div></div>`;
  }
  if(r.rewrite){
    html += `<div class="card"><div class="card-head"><span class="card-title">✍️ Reescritura compliant</span></div><div class="card-body"><div class="brief">${esc(r.rewrite)}</div></div></div>`;
  }
  if(r.requiresAck){
    html += `<div class="card"><div class="card-body"><p class="muted" style="margin-bottom:10px">Un agente con licencia puede aprobar bajo su responsabilidad. El override queda registrado en el audit log.</p>
      <button class="btn btn-red btn-sm" id="ack" style="background:var(--red-lt);color:var(--red);border:1px solid var(--red)">Aprobar bajo mi responsabilidad</button></div></div>`;
  }
  $('#result').innerHTML = html;
  const ackBtn = $('#ack');
  if(ackBtn) ackBtn.onclick = async ()=>{ ackBtn.disabled=true; const r2=await api('/api/security/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,acknowledged:true})}); renderVerdict(r2,text); };
}

// ── SKILLS ──
async function renderSkills(){
  const {skills=[]} = await api('/api/skills');
  const drafts = skills.filter(s=>s.status==='draft');
  const approved = skills.filter(s=>s.status==='approved');
  setBadge('skills', drafts.length, 'muted');
  const draftBlock = drafts.length ? `<div class="card"><div class="card-head"><span class="card-title">📝 Propuestas — requieren tu aprobación</span></div><div class="card-body">`
    + drafts.map(s=>`<div class="card2" data-sk="${s.id}">
        <div class="nm">${esc(s.name)} <span class="muted">· ${esc(s.source)}</span></div>
        <textarea rows="4" data-steps="${s.id}" style="margin-top:8px">${esc(s.steps)}</textarea>
        <div class="toolbar" style="margin-top:8px">
          <button class="btn btn-gold btn-sm" data-approve="${s.id}">✓ Aprobar</button>
          <button class="btn btn-ghost btn-sm" data-reject="${s.id}">Descartar</button>
        </div></div>`).join('') + `</div></div>` : '';
  const approvedBlock = approved.length ? `<div class="card"><div class="card-head"><span class="card-title">📘 Aprobadas (invocables)</span></div><div class="card-body" style="padding:6px 18px">`
    + approved.map(s=>`<div class="row"><div class="grow"><div class="nm">${esc(s.name)} <span class="pill ok">activa</span></div>
        <div class="sub">triggers: ${(s.trigger||[]).map(esc).join(', ')||'—'} · usada ${s.invocations||0}x</div>
        <div class="brief" style="font-size:12px;margin-top:6px">${esc(s.steps)}</div></div></div>`).join('') + `</div></div>` : '';
  $('#main').innerHTML = head('Skills', 'Playbooks que SAMIA propone al detectar un patrón; tú los apruebas y se vuelven invocables.')
    + `<div class="toolbar"><button class="btn btn-ghost btn-sm" id="newSkill">+ Nueva skill</button></div>`
    + (drafts.length||approved.length ? draftBlock+approvedBlock : empty('📘','Sin skills aún. Aparecen cuando un tema se repite (o créala a mano).'));
  $('#main').querySelectorAll('[data-approve]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.approve; const steps=$(`[data-steps="${id}"]`).value;
    b.disabled=true; await api('/api/skills/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,steps})}); go('skills');
  });
  $('#main').querySelectorAll('[data-reject]').forEach(b=>b.onclick=async()=>{
    b.disabled=true; await api('/api/skills/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:b.dataset.reject})}); go('skills');
  });
  $('#newSkill').onclick = async ()=>{
    const name=prompt('Nombre de la skill:'); if(!name)return;
    const trigger=(prompt('Palabras que la activan (separadas por coma):')||'').split(',').map(x=>x.trim()).filter(Boolean);
    const steps=prompt('Pasos del playbook:')||'';
    await api('/api/skills',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,trigger,steps,source:'manual'})}); go('skills');
  };
}

// ── CRECIMIENTO ──
async function renderGrowth(){
  const {ideas=[], lastRun, topics=[], nextTopic} = await api('/api/growth');
  const active = ideas.filter(i=>i.status==='new'||i.status==='doing');
  setBadge('crecimiento', ideas.filter(i=>i.status==='new').length, 'muted');
  const effPill = e => e==='bajo'?'<span class="pill ok">esfuerzo bajo</span>':e==='alto'?'<span class="pill alert">esfuerzo alto</span>':'<span class="pill">esfuerzo medio</span>';
  const card = i => `<div class="card2" data-g="${i.id}">
      <div class="nm">${esc(i.title)} ${i.status==='doing'?'<span class="pill">en curso</span>':''}</div>
      <div class="sub">${esc(i.topicLabel)} · ${effPill(i.effort)}</div>
      <div class="brief" style="font-size:13px;margin-top:6px">${esc(i.insight)}</div>
      <div style="font-size:13px;margin-top:6px"><b>Acción:</b> ${esc(i.action)}</div>
      ${i.source?`<div class="sub" style="margin-top:4px"><a href="${esc(i.source)}" target="_blank" rel="noopener">fuente ↗</a></div>`:''}
      <div class="toolbar" style="margin-top:8px">
        ${i.status==='new'?`<button class="btn btn-gold btn-sm" data-do="${i.id}">▶ Hacerlo</button>`:''}
        ${i.status==='doing'?`<button class="btn btn-gold btn-sm" data-done="${i.id}">✓ Hecho</button>`:''}
        <button class="btn btn-ghost btn-sm" data-dismiss="${i.id}">Descartar</button>
      </div></div>`;
  const lr = lastRun ? `última investigación: ${fmtDate(lastRun.at)} · tema "${esc(lastRun.topic)}" · ${lastRun.found} idea(s)${lastRun.error?` · ⚠️ ${esc(lastRun.error)}`:''}` : 'aún no se ha investigado';
  $('#main').innerHTML = head('Crecimiento', 'Cada semana SAMIA investiga (con búsqueda web real) cómo mejorar el negocio y trae ideas accionables con su fuente.')
    + `<div class="card"><div class="card-body" style="font-size:13px;color:var(--text-mid)">
        Próximo tema: <b>${esc(topics.find(t=>t.key===nextTopic)?.label||nextTopic)}</b> · corre los lunes 05:00.<br>${lr}
        <div class="toolbar" style="margin-top:10px">
          <select id="gTopic" style="font:inherit;padding:6px 8px;border:1px solid var(--border-d);border-radius:8px;background:var(--white)">
            <option value="">Tema de esta semana</option>${topics.map(t=>`<option value="${t.key}">${esc(t.label)}</option>`).join('')}
          </select>
          <button class="btn btn-gold btn-sm" id="gRun">🔎 Investigar ahora</button>
        </div></div></div>`
    + (active.length ? active.map(card).join('') : empty('🚀','Sin ideas todavía. Corre una investigación o espera al lunes.'));
  $('#gRun').onclick = async ()=>{
    const btn=$('#gRun'); const topic=$('#gTopic').value;
    btn.disabled=true; btn.textContent='Investigando… (puede tardar)';
    const r = await api('/api/growth/research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic})});
    if(!r.ok && r.error) alert('Sin ideas: '+r.error);
    go('crecimiento');
  };
  const setStatus = (id,status)=>api('/api/growth/idea',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status})}).then(()=>go('crecimiento'));
  $('#main').querySelectorAll('[data-do]').forEach(b=>b.onclick=()=>setStatus(b.dataset.do,'doing'));
  $('#main').querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>setStatus(b.dataset.done,'done'));
  $('#main').querySelectorAll('[data-dismiss]').forEach(b=>b.onclick=()=>setStatus(b.dataset.dismiss,'dismissed'));
}

// ── SISTEMA ──
async function renderSystem(){
  const s = await api('/api/intel/scheduler');
  const jobs = s.jobs.map(j=>`<div class="row"><div class="grow"><div class="nm">${esc(j.name)}</div><div class="sub">${esc(JSON.stringify(j.schedule))}</div></div><span class="muted">último: ${fmtDate(j.lastRun)}</span></div>`).join('');
  const recent = (s.recent||[]).map(r=>`<div class="kv"><b>${esc(r.job)}</b> ${r.ok?'✅':'⚠️ '+esc(r.error||'')} <span class="muted">${fmtDate(r.at)}</span></div>`).join('') || '<p class="muted">Sin ejecuciones recientes.</p>';
  $('#main').innerHTML = head('Sistema', `Scheduler ${s.running?'activo':'detenido'}`)
    + `<div class="card" style="border-color:var(--amber);background:var(--amber-lt)"><div class="card-body" style="font-size:13px;color:var(--text-mid)">⚠️ El scheduler solo corre mientras el servidor está vivo. En un entorno efímero los crons no siguen tras cerrar la sesión — para que disparen de verdad hay que desplegar en algo always-on.</div></div>`
    + `<div class="toolbar"><button class="btn btn-teal btn-sm" id="runjobs">▶ Correr trabajos ahora</button></div>`
    + `<div class="card"><div class="card-head"><span class="card-title">Trabajos programados</span></div><div class="card-body" style="padding:6px 18px">${jobs}</div></div>`
    + `<div class="card"><div class="card-head"><span class="card-title">Ejecuciones recientes</span></div><div class="card-body">${recent}</div></div>`;
  $('#runjobs').onclick = async (e)=>{ e.target.disabled=true; await api('/api/intel/run-jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}); go('sistema'); };
}

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}

// ── boot ──
async function boot(){
  buildNav(); go(current);
  try{ const h = await api('/api/health'); $('#healthDot').className='dot on'; $('#healthTxt').textContent='conectado'+(h.kb?` · KB ${h.kb.cases} casos`:''); }
  catch{ $('#healthDot').className='dot off'; $('#healthTxt').textContent='sin conexión'; }
  // poblar badges sin abrir cada sección
  try{ const {signals=[]}=await api('/api/intel/signals'); setBadge('senales',signals.filter(s=>s.severity==='alto').length,''); }catch{}
  try{ const {commitments=[]}=await api('/api/intel/commitments'); setBadge('compromisos',commitments.filter(c=>c.status==='overdue').length,''); }catch{}
  try{ const {candidates=[]}=await api('/api/memory/merge-candidates'); setBadge('memoria',candidates.length,'muted'); }catch{}
  try{ const {skills=[]}=await api('/api/skills?status=draft'); setBadge('skills',skills.length,'muted'); }catch{}
  try{ const {ideas=[]}=await api('/api/growth?status=new'); setBadge('crecimiento',ideas.length,'muted'); }catch{}
  try{
    const {health}=await api('/api/intel/health');
    const chip=$('#scoreChip'); const klass={autopilot:'ok',revisa:'warn',necesita:'alto'}[health.band]||'info';
    chip.className='pill '+klass; chip.textContent='Salud '+health.score; chip.title=health.headline;
    chip.style.display=''; chip.onclick=()=>go('briefing');
  }catch{}
}
boot();
</script>
