// Try to detect if user wants ARIA to perform an action
async function ariaSendWithActions(){
  var inp=E('aria-inp');
  var text=inp?inp.value.trim():'';
  if(!text)return;
  
  addAriaMsg('user',text);
  if(inp)inp.value='';
  
  var msgs=E('aria-msgs');
  var t=document.createElement('div');
  t.className='cmsg';t.id='aria-t';
  t.innerHTML='<div style="width:30px;height:30px;border-radius:8px;background:#CCFBF1;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div><div class="typing"><div class="db"></div><div class="db"></div><div class="db"></div></div>';
  if(msgs){msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
  
  // Build conversation history
  var history=(S.ariaHistory||[]).slice(-3).flatMap(function(h){
    return [{role:'user',content:h.u},{role:'assistant',content:h.b}];
  });
  history.push({role:'user',content:text});
  
  // Detect action intent
  var lowerText = text.toLowerCase();
  var actionDetected = null;
  
  if(/cre(a|ar|ame|emos)?\s+(un\s+)?(ticket|tarea)/i.test(text)) actionDetected = 'ticket';
  else if(/agrega(r|me)?\s+(un\s+)?(lead|prospecto)/i.test(text)) actionDetected = 'lead';
  else if(/cre(a|ar|ame|emos)?\s+(una\s+)?(meta|objetivo)/i.test(text)) actionDetected = 'meta';
  else if(/agrega(r|me)?\s+(un\s+)?bono/i.test(text)) actionDetected = 'bono';
  else if(/cre(a|ar|ame|emos)?\s+(un\s+)?proyecto/i.test(text)) actionDetected = 'proyecto';
  else if(/(envia|manda|cre[ae])\s+(un\s+)?memo/i.test(text)) actionDetected = 'memo';
  else if(/agend(a|ar|ame)?\s+(una\s+)?(reuni[oó]n|junta|1:1)/i.test(text)) actionDetected = 'reunion';
  
  var systemPrompt = buildAriaSystemPrompt();
  if(actionDetected){
    systemPrompt += '\n\n=== ACCIÓN DETECTADA: '+actionDetected.toUpperCase()+' ===\nLa usuaria quiere que ejecutes una acción real en el sistema. Si tienes la información necesaria (qué, para quién, cuándo), responde SOLO con un bloque JSON así:\n```action\n{"type":"'+actionDetected+'","data":{...}}\n```\nseguido de un mensaje breve confirmando lo que harás.\n\nSi falta información, pregunta SOLO lo que falta. No hagas suposiciones.\n\nFormatos:\n- ticket: {type:"ticket", data:{title:"...", desc:"...", priority:"alta|media|baja", assignedTo:"sami|arlette|skarleth"}}\n- lead: {type:"lead", data:{name:"...", phone:"...", source:"...", assignedTo:"..."}}\n- meta: {type:"meta", data:{title:"...", scope:"company|personal", mid:"sami|arlette|skarleth", due:"..."}}\n- bono: {type:"bono", data:{mid:"sami|arlette|skarleth", amount:50, note:"..."}}\n- proyecto: {type:"proyecto", data:{title:"...", desc:"...", assignedTo:"..."}}\n- memo: {type:"memo", data:{title:"...", body:"...", priority:"high|medium|low"}}\n- reunion: {type:"reunion", data:{titulo:"...", fecha:"YYYY-MM-DD", tipo:"1on1|semanal|standup", asistentes:["isabel","sami"]}}';
  }
  
  var response = await callClaude(systemPrompt, history);
  
  var t2=E('aria-t');if(t2)t2.remove();
  
  // Check if response contains an action block
  var actionMatch = response.match(/```action\s*([\s\S]*?)```/);
  if(actionMatch){
    try{
      var action = JSON.parse(actionMatch[1].trim());
      var executed = executeAriaAction(action);
      var cleanResponse = response.replace(/```action[\s\S]*?```/,'').trim();
      addAriaMsg('bot', cleanResponse + '\n\n✅ ' + executed);
      saveAriaExchange(text, cleanResponse + ' ' + executed);
    } catch(e) {
      addAriaMsg('bot', response);
      saveAriaExchange(text, response);
    }
  } else {
    addAriaMsg('bot', response);
    saveAriaExchange(text, response);
  }
}

// Execute an action ARIA wants to take
function executeAriaAction(action){
  var midMap = {sami:2, arlette:3, skarleth:4, isabel:1};
  
  try {
    if(action.type === 'ticket'){
      if(!S.tickets) S.tickets = {items:[]};
      var mid = midMap[(action.data.assignedTo||'').toLowerCase()] || null;
      S.tickets.items.unshift({
        id: uid(),
        title: action.data.title || 'Ticket',
        desc: action.data.desc || '',
        priority: action.data.priority || 'media',
        assignedTo: mid,
        status: 'abierto',
        date: new Date().toISOString().slice(0,10)
      });
      saveS();
      return 'Ticket creado: "'+action.data.title+'"' + (mid ? ' asignado a '+(tm(mid).name) : '');
    }
    
    if(action.type === 'lead'){
      if(!S.pipeline) S.pipeline = {leads:[]};
      var mid = midMap[(action.data.assignedTo||'').toLowerCase()] || null;
      S.pipeline.leads.unshift({
        id: uid(),
        name: action.data.name,
        phone: action.data.phone || '',
        source: action.data.source || '',
        stage: 'Nuevo Lead',
        assignedTo: mid,
        notes: action.data.notes || '',
        date: new Date().toISOString().slice(0,10)
      });
      saveS();
      return 'Lead "'+action.data.name+'" agregado al pipeline' + (mid ? ' para '+(tm(mid).name) : '');
    }
    
    if(action.type === 'meta'){
      if(action.data.scope === 'company'){
        if(!S.cg) S.cg = [];
        S.cg.push({
          id: uid(),
          title: action.data.title,
          progress: 0,
          owner: action.data.owner || '',
          due: action.data.due || '',
          priority: 'high',
          trend: 'flat',
          notes: ''
        });
      } else {
        if(!S.pg) S.pg = [];
        var mid = midMap[(action.data.mid||'').toLowerCase()] || null;
        S.pg.push({
          id: uid(),
          mid: mid,
          title: action.data.title,
          progress: 0,
          done: false,
          due: action.data.due || '',
          notes: ''
        });
      }
      saveS();
      return 'Meta creada: "'+action.data.title+'"';
    }
    
    if(action.type === 'bono'){
      var mid = midMap[(action.data.mid||'').toLowerCase()];
      if(!mid) return 'No identifiqué a quién darle el bono.';
      if(!S.payroll) S.payroll = {bonusLog:{}};
      if(!S.payroll.bonusLog) S.payroll.bonusLog = {};
      if(!S.payroll.bonusLog[String(mid)]) S.payroll.bonusLog[String(mid)] = [];
      S.payroll.bonusLog[String(mid)].push({
        amount: parseFloat(action.data.amount) || 0,
        note: action.data.note || 'Bono',
        date: new Date().toLocaleDateString('es',{day:'numeric',month:'short'}),
        ts: Date.now()
      });
      saveS();
      return 'Bono de $'+action.data.amount+' registrado para '+(tm(mid).name);
    }
    
    if(action.type === 'proyecto'){
      if(!S.projects) S.projects = {items:[]};
      var mid = midMap[(action.data.assignedTo||'').toLowerCase()] || null;
      S.projects.items.push({
        id: uid(),
        title: action.data.title,
        desc: action.data.desc || '',
        due: action.data.due || '',
        status: 'pendiente',
        progress: 0,
        assignedTo: mid
      });
      saveS();
      return 'Proyecto creado: "'+action.data.title+'"';
    }
    
    if(action.type === 'memo'){
      if(!S.memos) S.memos = [];
      S.memos.unshift({
        id: uid(),
        title: action.data.title,
        body: action.data.body,
        from: 1,
        to: [2,3,4],
        date: new Date().toLocaleDateString('es',{day:'numeric',month:'short'}),
        priority: action.data.priority || 'medium',
        read: {2:false, 3:false, 4:false}
      });
      saveS();
      return 'Memo enviado al equipo: "'+action.data.title+'"';
    }
    
    if(action.type === 'reunion'){
      if(!S.meetings) S.meetings = [];
      var asistentes = (action.data.asistentes||['isabel']).map(function(n){return midMap[n.toLowerCase()];}).filter(Boolean);
      S.meetings.push({
        id: uid(),
        fecha: action.data.fecha || new Date().toISOString().slice(0,10),
        titulo: action.data.titulo,
        tipo: action.data.tipo || '1on1',
        status: 'upcoming',
        asistentes: asistentes,
        recurrencia: '',
        notas: '',
        acciones: [],
        secciones: [{nombre:'Agenda', items:[]}]
      });
      saveS();
      return 'Reunión agendada: "'+action.data.titulo+'" para '+action.data.fecha;
    }
  } catch(e){
    return 'Hubo un error ejecutando la acción: '+e.message;
  }
  
  return 'Acción no reconocida.';
}

async function saveCRMConfig(){
  var type=(E('_crmtype')||{}).value||'';
  var url=(E('_crmurl')||{}).value||'';
  var token=(E('_crmtoken')||{}).value||'';
  if(!type){toast('Selecciona el tipo de CRM');return;}
  if(!url){toast('Ingresa la URL del API');return;}
  if(!token){toast('Ingresa el API key o token');return;}
  // Test connection
  toast('Probando conexión...');
  try{
    var testResp=await fetch(url.replace(/\/$/, '')+'/ping',{
      method:'GET',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},signal:AbortSignal.timeout(5000)
    });
    // If ping doesn't exist, any response means URL is reachable
    S.crmConfig={type:type,url:url.replace(/\/$/,''),token:token,connected:true,lastSync:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})};
  }catch(e){
    // Can't verify but save anyway — different CRMs have different ping endpoints
    S.crmConfig={type:type,url:url.replace(/\/$/,''),token:token,connected:true,lastSync:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})};
  }
  saveS();closeModal();toast('CRM conectado: '+type+' ✓');rDash();
}
function disconnectCRM(){
  if(!confirm('¿Desconectar el CRM? Los datos locales se mantienen.'))return;
  S.crmConfig={type:'',url:'',token:'',connected:false,lastSync:''};
  saveS();closeModal();toast('CRM desconectado');rDash();
}
async function syncFromCRM(){
  var cfg=S.crmConfig;
  if(!cfg||!cfg.connected||!cfg.url||!cfg.token){toast('Conecta un CRM primero');return;}
  toast('Sincronizando con '+cfg.type+'...');
  try{
    var resp=await fetch(cfg.url+'/leads',{
      method:'GET',
      headers:{'Authorization':'Bearer '+cfg.token,'Content-Type':'application/json'},
      signal:AbortSignal.timeout(8000)
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var data=await resp.json();
    var leads=Array.isArray(data)?data:(data.leads||data.records||data.data||[]);
    var added=0;
    leads.forEach(function(l){
      var exists=(S.pipeline.leads||[]).some(function(ex){return ex.crmId===l.id||ex.name===l.name;});
      if(!exists&&l.name){
        if(!S.pipeline)S.pipeline={leads:[]};
        S.pipeline.leads.unshift({
          id:uid(),crmId:l.id||'',name:l.name||l.full_name||'',
          phone:l.phone||l.phone_number||'',
          source:l.source||l.lead_source||'CRM Import',
          stage:l.stage||'Nuevo Lead',
          assignedTo:null,notes:l.notes||'',
          date:new Date().toISOString().slice(0,10),
          t65:!!(l.t65||l.turning65),hot:!!(l.hot||l.is_hot)
        });
        added++;
      }
    });
    S.crmConfig.lastSync=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    saveS();rRefresh();rDash();
    toast(added>0?added+' leads importados del CRM ✓':'CRM al día — sin leads nuevos');
  }catch(err){
    console.error('CRM sync error:',err);
    toast('Error al sincronizar: '+err.message+'. Verifica URL y token.');
  }
}

window.saveContactLog=function(cid,ctid,advance){
  var c=getCampaign(cid);if(!c)return;
  var ct=c.contacts.find(function(x){return x.id===ctid;});if(!ct)return;
  var tpl=getTemplate(c.template);
  var outcome=document.getElementById('selOc')?document.getElementById('selOc').value:'no_answer';
  var selStep=document.getElementById('selStep')?parseInt(document.getElementById('selStep').value):ct.currentStep;
  var notes=document.getElementById('actNotes')?document.getElementById('actNotes').value:'';
  if(!ct.history)ct.history=[];
  ct.history.push({id:uid(),step:selStep,stepLabel:tpl.steps[selStep]?tpl.steps[selStep].label:'',date:todayStr(),notes:notes,outcome:outcome,advanced:advance});
  if(selStep!==ct.currentStep)ct.currentStep=selStep;
  if(advance){
    if(outcome==='declined'||outcome==='replied_no'){ct.status='dropped';}
    else{
      var ni=Math.min(ct.currentStep+1,tpl.steps.length-1);
      ct.currentStep=ni;
      if(outcome==='enrolled')ct.status='enrolled';
      else if(outcome==='interested'||outcome==='replied_interested')ct.status='interested';
      else if(outcome==='appt')ct.status='appointed';
      else ct.status='active';
    }
  } else {
    if(outcome==='enrolled')ct.status='enrolled';
    else if(outcome==='interested'||outcome==='replied_interested')ct.status='interested';
    else if(outcome==='appt')ct.status='appointed';
    else if(outcome==='declined'||outcome==='replied_no')ct.status='dropped';
  }
  // Auto-update dashboard logs
  if(!S.logs)S.logs={};
  var today=todayStr();
  var lk=today+'_'+c.agent;
  if(!S.logs[lk])S.logs[lk]={date:today,agent:c.agent,calls:0,interested:0,appts:0,enrolled:0};
  S.logs[lk].calls=(S.logs[lk].calls||0)+1;
  if(outcome==='interested'||outcome==='replied_interested')S.logs[lk].interested=(S.logs[lk].interested||0)+1;
  if(outcome==='appt')S.logs[lk].appts=(S.logs[lk].appts||0)+1;
  if(outcome==='enrolled')S.logs[lk].enrolled=(S.logs[lk].enrolled||0)+1;
  saveS();closeModal();
  if(window._showQuesSigue)window._showQuesSigue(outcome,ct.name||'',c.agent||'',ct.phone||'',c.name||'');
  rActs && rActs();
};

window.togglePlan=function(btn){
  var sub=document.getElementById('planSub');
  var open=sub.style.display==='block';
  sub.style.display=open?'none':'block';
  btn.classList.toggle('open',!open);
};
window.goGrowthTab=function(tab,btn){
  showTab("growth",btn);
  _gNav(tab);
};
</script>
