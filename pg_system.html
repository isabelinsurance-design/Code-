a8';return`<div style=\"margin-bottom:14px\"><div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px\"><span style=\"font-size:14px;font-weight:700;color:#1a2332\">${lbl}<\/span><span style=\"color:${c}\"><span style=\"font-size:20px;font-weight:900\">${val}<\/span><span style=\"font-size:12px;color:#8098b3\"> / ${target}<\/span> <span style=\"font-size:12px;font-weight:700\">(${p}%)<\/span><\/span><\/div><div class=\"pbar\" style=\"height:12px;border-radius:6px\"><div class=\"pfill\" style=\"width:${p}%;background:${c};border-radius:6px\"><\/div><\/div><\/div>`;};\n  // Action items\n  const actionItems=[];\n  S.campaigns.filter(c=>c.status==='active').forEach(c=>{\n    const tpl=getTemplate(c.template);\n    c.contacts.filter(ct=>ct.status==='active').forEach(ct=>{\n      const lastAct=(ct.history||[]).slice(-1)[0];\n      const lastDate=lastAct?lastAct.date:ct.addedDate;\n      const daysStale=daysDiff(lastDate,t);\n      const stepInfo=tpl.steps[ct.currentStep];\n      if(daysStale>=(stepInfo?.days||1)) actionItems.push({contactName:ct.name,phone:ct.phone,stepLabel:stepInfo?.label||'',campaignName:c.name,campaignId:c.id,contactId:ct.id,daysStale,isUrgent:daysStale>5,agent:c.agent});\n    });\n  });\n  actionItems.sort((a,b)=>b.daysStale-a.daysStale);\n  return`\n  <div style=\"background:#1e2d3d;color:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px\">\n    <div style=\"font-size:10px;color:#bfdbfe;font-weight:700;margin-bottom:6px\">📋 CHECK-UP DIARIO — ${fmtD(t)}<\/div>\n    <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap\">\n      ${[['📞',totals.calls,'Llamadas'],['✅',totals.answered,'Contestaron'],['🔥',totals.interested,'Interesados'],['📅',totals.appts,'Citas'],['🎉',totals.enrolled,'Inscritos'],['⚡',actionItems.length,'Acciones']].map(([ic,v,l])=>`\n        <div style=\"text-align:center\">\n          <div style=\"font-size:20px;font-weight:900;color:${l==='Inscritos'?'#4ade80':l==='Accio   return h;\n}\nfunction vCampaignDetail(cid){\n  const c=getCampaign(cid);if(!c){S._viewingCampaign=null;return vCampaigns();}\n  const tpl=getTemplate(c.template);const stats=campaignStats(c);const counts=stepCounts(c);\n  const t=todayStr;\n  const allActs=campActivities(c);const todayActs=allActs.filter(a=>a.date===t);\n  const actByType={};ACT_TYPES.forEach(at=>{actByType[at.type]=todayActs.filter(a=>a.actType===at.type).length;});\n  const dailyLog={};allActs.forEach(a=>{if(!dailyLog[a.date])dailyLog[a.date]={};if(!dailyLog[a.date][a.actType])dailyLog[a.date][a.actType]=0;dailyLog[a.date][a.actType]++;});\n  const logDates=Object.keys(dailyLog).sort((a,b)=>b.localeCompare(a)).slice(0,14);\n  const todayItems=c.contacts.filter(ct=>ct.status==='active').map(ct=>{\n    const lastAct=(ct.history||[]).slice(-1)[0];const lastDate=lastAct?lastAct.date:ct.addedDate;const daysStale=daysDiff(lastDate,t);\n    const stepInfo=tpl.steps[ct.currentStep];const nextDays=stepInfo?stepInfo.days:1;\n    return{ct,daysStale,stepInfo,overdue:daysStale>=nextDays};\n  }).filter(x=>x.overdue).sort((a,b)=>b.daysStale-a.daysStale);\n  const sorted=[...c.contacts].sort((a,b)=>{if(a.status==='dropped'&&b.status!=='dropped')return 1;if(b.status==='dropped'&&a.status!=='dropped')return -1;if(b.currentStep!==a.currentStep)return b.currentStep-a.currentStep;return a.name.localeCompare(b.name);});\n  return`\n  <div style=\"display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap\">\n    <button class=\"btn\" onclick=\"closeCampaign()\">← Volver<\/button>\n    <button onclick=\"openEditCampaign('${c.id}')\" style=\"padding:7px 16px;border:1px solid #20b2a8;border-radius:6px;background:#e6f4f1;color:#20b2a8;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit\">Editar info<\/button>\n    <button onclick=\"openAddContact('${c.id}')\" style=\"padding:7px 16px;border:none;border-radius:6px;background:#20b2a8;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit\"       }).join('');\n    })()}\n  <\/div>\n  <!-- DAILY LOG -->\n  ${logDates.length>0?`\n  <div class=\"card\">\n    <div class=\"ctitle\">📅 Registro Diario de Actividad (últimos 14 días)<\/div>\n    ${logDates.map(date=>{\n      const dayActs=dailyLog[date];\n      const enrolled=allActs.filter(a=>a.date===date&&a.outcome==='enrolled').length;\n      return`<div style=\"display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9;align-items:center;flex-wrap:wrap\">\n        <div style=\"min-width:80px;font-size:11px;font-weight:700;color:${date===t?'#e67e22':'#475569'}\">${date===t?'⚡ HOY':fmtDshort(date)}<\/div>\n        <div style=\"display:flex;gap:3px;flex-wrap:wrap;flex:1\">\n          ${ACT_TYPES.filter(at=>dayActs[at.type]).map(at=>`<span class=\"act-chip ${at.cls}\">${at.icon} ${dayActs[at.type]}<\/span>`).join('')}\n          ${enrolled>0?`<span class=\"badge bgreen\">🎉 ${enrolled} inscrito(s)<\/span>`:''}\n        <\/div>\n      <\/div>`;\n    }).join('')}\n  <\/div>`:''}\n  <!-- CONTACTS -->\n  <div class=\"card\">\n    <div class=\"ctitle\"><span>Contactos (${c.contacts.length})<\/span>\n      <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n        <button class=\"btn xs blue\" onclick=\"openAddContact('${c.id}')\">+ Un contacto<\/button>\n        <button class=\"btn\" style=\"background:#0D9488;color:#fff;border-color:#0D9488;font-size:12px;padding:6px 14px\" onclick=\"openBulkContact('${c.id}')\">Importar Lista (CSV / Notion / Pegar)<\/button>\n      <\/div>\n    <\/div>\n    <div style=\"background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#15803d\">\n      Puedes seguir agregando contactos en cualquier momento — una campaña puede durar varios días o semanas.\n    <\/div>\n    <\/div>\n    ${sorted.length===0?`<div class=\"empty\">Sin contactos aún.<\/div>`:''}\n    ${sorted.map(ct=>{\n      const stepLabel=ct.status==='dropped'?'Descartado':ct.currentStep>=tpl.steps.length  Retención NO es solo no perderlos — es convertirlos en promotores.<\/div>')}\n  ${section(8,'8️⃣ EJECUCIÓN — 3 Fases',sec8)}`;\n}\n\nfunction vScripts(){\n  return`\n    <div style=\"background:var(--navy);border-radius:10px;padding:18px 20px;margin-bottom:14px;color:#fff\"><div style=\"font-size:9px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px\">Herramientas<\/div><div style=\"font-size:24px;font-weight:800;letter-spacing:-.3px\">Guiones de Llamada<\/div><div style=\"font-size:12px;color:rgba(255,255,255,.55);margin-top:3px\">Scripts listos para usar con cada tipo de prospecto<\/div><\/div>\\n    <div class=\"tpmo-footer\"><strong>AVISO TPMO REQUERIDO en todos los materiales.<\/strong> Ver tab Compliance para el texto exacto. Incluir en anuncios, emails, landing pages y flyers.<\/div>\n<div class=\"hero\"><h2>💬 Guiones de Llamada<\/h2><p>Practica cada guión en voz alta antes del bloque de llamadas. Sonríe mientras lees.<\/p><\/div>\n  <div class=\"card\"><div class=\"ctitle\">Guión 1 — Ex-Miembro (30-40%) <span class=\"badge bblue\">30-40%<\/span><\/div>\n  <div class=\"script-box\">APERTURA (5 seg):\n\"Hola [Nombre], soy [Tu Nombre] — ¿me recuerdas? Yo te ayudaba con tu plan de Medicare.\"\n\n[Si te recuerdan]: \"¿Cómo va tu cobertura actual? ¿Estás contento/a con el dental y la visión?\"\n[Si frustrado]: \"Por eso llamé — en inscripción abierta puedes cambiar. ¿Puedo tomar 10 minutos?\"\n[Si feliz]: \"¡Me alegra! Los planes cambian cada año. Inscripción Oct 15. ¿Puedo llamarte entonces?\"\n[Sin interés]: \"¿Puedo enviarte info por texto? Quiero que no pierdas beneficios.\"\n\nCIERRE: \"Te envío mi info ahora mismo. Llámame cuando quieras — estoy aquí todo el año.\"<\/div><\/div>\n  <div class=\"card\"><div class=\"ctitle\">Guión 2 — Prospectos / Nuevo (15-25%) <span class=\"badge bamber\">15-25%<\/span><\/div>\n  <div class=\"script-box\">APERTURA: \"Hola [Nombre], soy [Tu Nombre]. Nos conocimos [en la iglesia / a través de María / en el centro senior].\"\n\nPROPÓSITO: \"Ayudo a personas en Medicare a obtener mejor cobertura — dental, visión, audífonos, medicamentos — sin costo extra. Muchos no saben qué beneficios están perdiendo.\"\n\nCALIFICAR: \"¿Está usted en Medicare? ¿Original o Medicare Advantage?\"\n[ORIGINAL]: \"Podría estar perdiendo beneficios gratis. ¿10 minutos para revisar?\"\n[TIENE MA - insatisfecho]: \"Puede que pueda encontrarle algo mejor. ¿Comparación rápida, sin compromiso?\"\n[INTERESADO]: \"¡Perfecto! Le envío resumen ahora y le llamo [día/hora]. ¿De acuerdo?\"\n\nCIERRE: \"¡Excelente! ¡Cuídese [Nombre]! Hablamos el [día].\"<\/div><\/div>\n  <div class=\"card\"><div class=\"ctitle\">Guión 4 — Explicar SOA sin Asustar <span class=\"soa-badge\">✍️ SOA Requerido<\/span><\/div>\n  <div class=\"script-box\">¿QUÉ DECIR CUANDO PIDEN EL SOA?\n\n\"Antes de que podamos hablar sobre planes específicos, necesito que firmes un formulario que se llama Scope of Appointment — en español, 'Alcance de la Cita'. Es un requisito del gobierno federal, no mío.\n\nLo que dice es simple: estás de acuerdo en reunirte conmigo para revisar opciones de Medicare Advantage. Eso es todo. No te estás comprometiendo a nada. No tienes que cambiar tu plan. Solo es para que el gobierno sepa de qué hablamos en nuestra cita.\n\nTe lo envío ahora mismo por [texto/email]. Son dos líneas y tu firma. ¿Lo puedes firmar hoy para que podamos agendar nuestra cita esta semana?\"\n\nSI PREGUNTAN POR QUÉ:\n\"Es una protección para ti también — así queda documentado exactamente de qué hablamos. El gobierno lo requiere para todos los agentes de Medicare.\"\n\nSI SE RESISTEN:\n\"Entiendo. Puedo explicarte todo sobre Medicare en general hoy sin el formulario — pero para poder mostrarte planes específicos y precios, sí lo necesito. ¿Le parece bien hablar hoy en general y agendamos la cita formal para esta semana?\"<\/div><\/div>\n\n  <div class=\"card\"><div class=\"ctitle\">Guión 5 — T65 / Primer Medicare <span class=\"badge bblue\">Alta Conversión<\/span><\/div>\n  <div class=\"script-box\">PARA PERSONAS CUMPLIENDO 65 — PRIMER MEDICARE\n\nAPERTURA (si referido de miembro):\n\"Hola [Nombre], soy [Tu Nombre]. Su [familiar/amigo] me dijo que usted cumple 65 en [mes] y que va a entrar a Medicare por primera vez. ¡Felicitaciones! ¿Tiene unos minutos? Quiero asegurarme de que no se pierda ningún beneficio.\"\n\nAPERTURA (lista propia):\n\"Hola [Nombre], soy [Tu Nombre], agente de Medicare en [área]. Vi que usted está a punto de cumplir 65 — ¿ya está pensando en Medicare?\"\n\nEDUCAR PRIMERO:\n\"Medicare tiene dos partes básicas: la Parte A para hospital y la Parte B para médicos. Pero sola, Medicare cubre el 80% — usted paga el otro 20%. Por eso la mayoría de la gente también tiene un plan Medicare Advantage, que es un plan privado aprobado por Medicare que cubre el 20% restante Y agrega beneficios como dental, visión, audífonos y medicamentos — generalmente con $0 de prima mensual.\"\n\nCALIFICAR:\n\"¿Usted tiene también Medicaid? [Si sí → D-SNP/dual eligible, tarjeta OTC, comidas, transporte]\n¿Cuáles médicos ve regularmente? [Verificar que estén en red]\n¿Toma medicamentos recetados? [Verificar formulario]\"\n\nSIGUIENTE PASO:\n\"Me gustaría reunirme con usted [esta semana / la próxima] para revisarle las opciones específicas para su situación. Le voy a enviar un formulario corto del gobierno que firma primero — son dos líneas — y luego agendamos. ¿Le parece bien?\"<\/div><\/div>\n\n  <div class=\"card\"><div class=\"ctitle\">Guión 3 — Revisión Anual / Prime→Select <span class=\"badge bgreen\">20-35% conversión<\/span><\/div>\n  <div class=\"script-box\">APERTURA: \"Hola [Nombre], soy [Tu Nombre]. Es hora de tu revisión anual gratuita — quiero asegurarme de que sigas en el mejor plan.\"\n\nLAS 5 PREGUNTAS CLAVE:\n1. \"¿Mismos médicos? ¿Misma red?\"\n2. \"¿Usando dental y visión?\"\n3. \"¿Cambiaron medicamentos?\"\n4. \"¿Usas tu tarjeta OTC? ¿Comidas? ¿Transporte?\" ← ¡CLAVE!\n5. \"¿Frustraciones o problemas este año?\"\n\n⚠️ Si SÍ usa OTC/comidas/transporte → QUEDARSE EN PRIME. Si no, considerar Select.\n\nCIERRE: \"Te envío comparación ahora. Hablamos el [fecha].\"<\/div><\/div>`;\n}\n\nfunction vObjections(){\n  const obs=[\n    {q:\"No estoy interesado/a\",a:'\"Lo entiendo. ¿Puedo enviarle información por texto? La inscripción solo es una vez al año — quiero asegurarme de que no pierda beneficios a los que tiene derecho.\"'},\n    {q:\"Ya tengo un plan\",a:'\"¡Qué bueno! Por eso es buen momento — los planes cambian cada año. ¿10 minutos para confirmar que el suyo sigue siendo lo mejor para el próximo año? Sin costo, sin compromiso.\"'},\n    {q:\"Lo voy a pensar\",a:'\"Por supuesto. ¿Qué es lo que está pensando principalmente? [escucha] ¿Le envío info y le llamo el [día/hora]?\"'},\n    {q:\"¿Esto es una estafa?\",a:'\"¡Pregunta válida! Soy corredor de seguros de Medicare con licencia. La aseguradora me paga — usted no paga nada, nunca. Puede verificarme en Medicare.gov.\"'},\n    {q:\"Necesito hablar con mi hijo/a\",a:'\"Por supuesto. ¿Sería útil si hablo con ellos también? Puedo hacer una llamada de tres personas. ¿Cuándo cree que podrá hablar con ellos?\"'},\n    {q:\"Estoy feliz con mi plan actual\",a:'\"¡Me alegra! Por eso es buen momento — confirmemos juntos que sigue siendo lo mejor. Solo 5 minutos. Los planes cambian beneficios y precios cada año.\"'},\n    {q:\"No tengo tiempo ahora\",a:'\"¡No hay problema! Esto toma menos de 10 minutos. ¿Esta tarde o mañana por la mañana? Le llamo exactamente a las [hora].\"'},\n    {q:\"¿Cuánto me cuesta a MÍ?\",a:'\"Cero. Nada. La aseguradora me paga — usted nunca me paga. Mi trabajo es encontrarle el MEJOR plan, no el más caro.\"'},\n  ];\n  return`\n  <div style=\"background:var(--navy);border-radius:10px;padding:18px 20px;margin-bottom:14px;color:#fff\"><div style=\"font-size:9px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px\">Herramientas<\/div><div style=\"font-size:24px;font-weight:800;letter-spacing:-.3px\">Manejo de Objeciones<\/div><div style=\"font-size:12px;color:rgba(255,255,255,.55);margin-top:3px\">Las 8 objeciones más comunes y exactamente qué decir<\/div><\/div>\n  ${obs.map(o=>`<div class=\"objection-card\"><div style=\"font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px\">DICEN:<\/div><div style=\"font-weight:700;color:#dc2626;font-size:12px;margin-bottom:6px\">❌ \"${o.q}\"<\/div><div style=\"font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px\">TÚ DICES:<\/div><div style=\"font-size:12px;color:#0f172a;line-height:1.6;background:#f0fdf4;border-radius:6px;padding:8px 10px;border-left:3px solid #16a34a\">${o.a}<\/div><\/div>`).join('')}`;\n}\n\nfunction vDailyPlan(){\n  const d=todayStr;\n  const sel=S._dailyAgent||S.myAgent;\n  const plan=getMonthPlan(d,sel);\n  const log=getLog(d,sel);\n  const camp=plan?getCampType(plan.campaign):null;\n  const done=plan?plan.tasks.filter(t=>t.done).length:0;\n  const total=plan?plan.tasks.length:0;\n  const pct=total>0?Math.round(done/total*100):0;\n  const nextTask=plan?.tasks.find(t=>!t.done);\n\n  return`\n  <!-- HEADER navy like Mi Dia -->\n  <div style=\"background:var(--navy);border-radius:10px;padding:18px 20px;margin-bottom:14px;color:#fff\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px\">\n      <div>\n        <div style=\"font-size:9px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px\">Plan del Día<\/div>\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:-.3px\">${fmtD(d)}<\/div>\n        <div style=\"font-size:12px;color:rgba(255,255,255,.55);margin-top:3px\">${camp?camp.nameEs:'Sin campaña asignada'}<\/div>\n      <\/div>\n      <div style=\"text-align:right\">\n        <div style=\"font-size:42px;font-weight:900;color:${pct===100?'#5fe8a0':'var(--teal)'};line-height:1\">${pct}%<\/div>\n        <div style=\"font-size:11px;color:rgba(255,255,255,.5);margin-top:2px\">${done}/${total} tareas<\/div>\n      <\/div>\n    <\/div>\n    ${total>0?`<div style=\"margin-top:14px\"><div style=\"height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden\"><div style=\"height:100%;background:${pct===100?'#5fe8a0':'var(--teal)'};width:${pct}%;border-radius:3px;transition:width .3s\"><\/div><\/div><\/div>`:''}\n    <div style=\"margin-top:12px;display:flex;gap:8px;flex-wrap:wrap\">\n      ${AGENTS.map(a=>`<button onclick=\"S._dailyAgent='${a}';re()\" style=\"padding:6px 14px;border:2px solid ${sel===a?'var(--teal)':'rgba(255,255,255,.2)'};border-radius:5px;background:${sel===a?'var(--teal)':'rgba(255,255,255,.08)'};color:#fff;cursor:pointer;font-size:12px;font-weight:${sel===a?'800':'500'};font-family:inherit\">${a}<\/button>`).join('')}\n    <\/div>\n  <\/div>\n\n  <!-- PLAN CARD -->\n  ${plan?`\n  <div class=\"card\" style=\"margin-bottom:14px\">\n    <div class=\"ctitle\">${fmtD(d)}\n      <button onclick=\"openMonthPlanEdit('${d}','${sel}',true)\" class=\"btn xs\">Editar<\/button>\n    <\/div>\n    ${plan.tasks.map((task,ti)=>`\n      <div onclick=\"toggleMonthTask('${d}','${sel}','${task.id}')\" style=\"display:flex;gap:10px;padding:10px 8px;border-radius:6px;cursor:pointer;align-items:center;border-bottom:1px solid var(--border-light);transition:background .1s\" onmouseover=\"this.style.background='var(--teal-light)'\" onmouseout=\"this.style.background=''\">\n        <div style=\"width:20px;height:20px;border-radius:4px;border:2px solid ${task.done?'var(--teal)':'var(--border)'};background:${task.done?'var(--teal)':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff;font-weight:800\">${task.done?'✓':''}<\/div>\n        <span style=\"font-size:13px;color:${task.done?'var(--text-muted)':'var(--text)'};text-decoration:${task.done?'line-through':'none'};flex:1\">${task.text}<\/span>\n      <\/div>\n    `).join('')}\n    ${pct===100?`<div style=\"text-align:center;padding:12px;color:var(--green);font-weight:800;font-size:13px\">✓ Plan completado — ¡Excelente, ${sel}!<\/div>`:''}\n  <\/div>`:`\n  <div class=\"card\" style=\"text-align:center;padding:32px 20px\">\n    <div style=\"font-size:13px;color:var(--text-muted);margin-bottom:16px\">No hay plan creado para hoy<\/div>\n    <button onclick=\"openMonthPlanEdit('${d}','${sel}',null)\" style=\"padding:11px 24px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.04em\">+ Crear Plan de Hoy<\/button>\n  <\/div>`}\n\n  <!-- CAMPAÑA -->\n  ${renderCampanaDia(sel)}\n`;\n}\nfunction vPrime(){\n  return`\n  <div class=\"hero\"><h2>⭐ Guía Prime → Select<\/h2><p>La revisión anual es tu herramienta más poderosa de retención y crecimiento.<\/p><\/div>\n  <div class=\"g2\">\n    <div style=\"background:#fef5e7;border-radius:10px;padding:13px;border:2px solid #fcd34d\">\n      <div style=\"font-size:13px;font-weight:900;color:#7d5a00;margin-bottom:8px\">🟡 PRIME = D-SNP (Plan Dual)<\/div>\n      <div class=\"sbox amber\">Requiere Medicare Y Medicaid<\/div>\n      <div class=\"sbox amber\">Prima $0 o muy baja<\/div>\n      <div class=\"sbox amber\"><strong>BENEFICIOS EXCLUSIVOS:<\/strong><br>• Tarjeta OTC ($35-150/mes)<br>• Comidas gratis post-hospital<br>• Transporte a citas<\/div>\n    <\/div>\n    <div style=\"background:#e8f8e8;border-radius:10px;padding:13px;border:2px solid #86efac\">\n      <div style=\"font-size:13px;font-weight:900;color:#166534;margin-bottom:8px\">🟢 SELECT = Medicare Advantage<\/div>\n      <div class=\"sbox green\">Solo Medicare — sin Medicaid<\/div>\n      <div class=\"sbox green\">Mejor dental (hasta $2,500)<\/div>\n      <div class=\"sbox green\">Mejor visión y audición<\/div>\n      <div class=\"sbox green\">Red más amplia de médicos<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"card\" style=\"border:2px solid #dc2626;margin-top:10px\">\n    <div class=\"ctitle\" style=\"color:#dc2626\">⚠️ NUNCA MOVER SI USAN ESTO<\/div>\n    <div class=\"sbox red\"><strong style=\"color:#dc2626\">Tarjeta OTC, Comidas, O Transporte<\/strong><br>SOLO existen en Prime. Mover = perder para siempre. Siempre pregunta esto primero.<\/div>\n  <\/div>\n  <div class=\"card\" style=\"background:#f8fafc;margin-top:8px\">\n    <div class=\"ctitle\">📋 Las 5 Preguntas de Revisión<\/div>\n    ${['1. \"¿Mismos médicos? ¿Misma red?\"','2. \"¿Usando dental y visión?\"','3. \"¿Cambiaron medicamentos?\"','4. \"¿Usa OTC? ¿Comidas? ¿Transporte?\" ← ¡CLAVE!','5. \"¿Frustraciones o problemas este año?\"'].map(q=>`<div style=\"display:flex;gap:8px;padding:5px 0;font-size:12px;line-height:1.6;align-items:flex-start\"><div style=\"flex-shrink:0\">→<\/div><div>${q}<\/div><\/div>`).join('')}\n  <\/div>`;\n}\n\n\n// ─── MONTH NAVIGATION ───\nwindow.mesAnterior=()=>{\n  const[y,m]=(S.planMonth||currentMonth()).split('-').map(Number);\n  const d=new Date(y,m-2,1);\n  S.planMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;\n  save();re();\n};\nwindow.mesSiguiente=()=>{\n  const[y,m]=(S.planMonth||currentMonth()).split('-').map(Number);\n  const d=new Date(y,m,1);\n  S.planMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;\n  save();re();\n};\nwindow.mesActual=()=>{S.planMonth=currentMonth();save();re();};\nwindow.goToDate=(dateStr)=>{\n  if(!dateStr)return;\n  S.planMonth=dateStr.slice(0,7);\n  save();re();\n  setTimeout(()=>{\n    const el=document.querySelector('[data-date=\"'+dateStr+'\"]');\n    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});\n  },100);\n};\nwindow.scrollToWeek=(wi)=>{\n  setTimeout(()=>{\n    const el=document.getElementById('week-row-'+wi);\n    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});\n  },50);\n};\nwindow.openCopiarMes=()=>{\n  const month=S.planMonth||currentMonth();\n  const[y,m]=month.split('-').map(Number);\n  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][m-1];\n  const days=getDaysInMonth(month).filter(d=>!d.weekend);\n  const selAgent=S._mesAgent||'all';\n  const agentsToShow=selAgent==='all'?AGENTS:[selAgent];\n  let report='\\u{1F4C5} PLAN DEL MES \\u2014 '+MN+' '+y+'\\n'+'='.repeat(36)+'\\n\\n';\n  agentsToShow.forEach(agent=>{\n    report+='\\u{1F464} '+agent.toUpperCase()+'\\n';\n    const aPlans=days.map(d=>({date:d.date,plan:getMonthPlan(d.date,agent)})).filter(x=>x.plan);\n    if(!aPlans.length){report+='  Sin planes.\\n\\n';return;}\n    aPlans.forEach(({date,plan})=>{\n      const camp=getCampType(plan.campaign);\n      const done=plan.tasks.filter(t=>t.done).length;\n      report+='  '+fmtD(date)+' '+camp.icon+' '+camp.nameEs+(plan.list?' \\u2014 '+plan.list:'')+'\\n';\n      report+='  Meta: '+(plan.goal||'\\u2014')+' \\u00B7 Tareas: '+done+'/'+plan.tasks.length+'\\n\\n';\n    });\n  });\n  navigator.clipboard.writeText(report).then(()=>alert('\\u2705 Plan del mes copiado!')).catch(()=>alert(report));\n};\n\n// ─── MONTH PLAN HANDLERS ───\nwindow.toggleMonthTask=(date,agent,taskId)=>{\n  const k=`${date}_${agent}`;const plan=S.monthPlans[k];if(!plan)return;\n  plan.tasks=plan.tasks.map(t=>t.id===taskId?{...t,done:!t.done}:t);\n  save();re();\n};\nwindow.desmarcarTodo=(date,agent)=>{\n  const k=`${date}_${agent}`;const plan=S.monthPlans[k];if(!plan)return;\n  plan.tasks=plan.tasks.map(t=>({...t,done:false}));\n  save();\n  // Refresh modal if open\n  const modal=document.getElementById('overlay');\n  if(modal.classList.contains('show')){openMonthPlanEdit(date,agent,true);}else{re();}\n};\nwindow.marcarTodo=(date,agent)=>{\n  const k=`${date}_${agent}`;const plan=S.monthPlans[k];if(!plan)return;\n  plan.tasks=plan.tasks.map(t=>({...t,done:true}));\n  save();\n  const modal=document.getElementById('overlay');\n (' | ');\n      report+='  Actividad: '+acts+'\\n';\n    }\n    report+='\\n';\n  });\n  report+='Guardado: '+now.toLocaleString('es')+'\\n';\n\n  // #13 - Save taskList from daily plan\n  const taskList=[];\n  AGENTS.forEach(agent=>{\n    const plan=getMonthPlan(t,agent);\n    if(plan&&plan.tasks){\n      plan.tasks.forEach(tk=>{taskList.push({agent,text:tk.text,done:tk.done});});\n    }\n  });\n\n  // #14 - Save campTasksDone\n  const campTasksDone={};\n  if(S._campTasks){\n    Object.keys(S._campTasks).forEach(key=>{\n      const parts=key.split('_');\n      const date=parts.pop();\n      if(date===t){\n        const campId=parts.join('_');\n        const camp=(S.campaigns||[]).find(c=>c.id===campId);\n        if(camp){\n          const tipo=CAMP_TYPES.find(ct=>ct.id===camp.template)||CAMP_TYPES[0];\n          const doneArr=S._campTasks[key]||[];\n          const tasks=(tipo.tasks||[]).map((text,i)=>({text,done:!!doneArr[i]}));\n          campTasksDone[camp.name]={done:tasks.filter(x=>x.done).length,total:tasks.length,tasks};\n        }\n      }\n    });\n  }\n\n  S.savedReports[t]={date:t,savedAt:timeStr,summary:summaryLine,agentData,reportText:report,taskList,campTasksDone};\n  save();\n\n  // #12 - Green modal instead of alert\n  if(!silent){\n    const lines=AGENTS.map(a=>{\n      const d=agentData[a];\n      return '<div style=\"display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #d1fae5\"><span style=\"font-weight:700\">'+a+'</span><span style=\"font-size:12px;color:#065f46\">'+d.calls+' llamadas &middot; '+d.enrolled+' inscritos &middot; '+d.tasksCompleted+'/'+d.totalTasks+' tareas</span></div>';\n    }).join('');\n    const modal='<div style=\"background:#16a34a;color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;text-align:center\"><div style=\"font-size:22px;margin-bottom:4px\">&#x2705;</div><div style=\"font-size:17px;font-weight:800\">Reporte Guardado</div><div style=\"font-size:12px;opacity:.8;margin-top:3px\">'+summaryLine+'</div></div><div style=\"margin-bottom:16px\">'+lines+'</div><div style=\"display:flex;gap:8px\"><button class=\"btn bg\" style=\"flex:1\" onclick=\"closeModal()\">Cerrar</button><button class=\"btn bp\" style=\"flex:1\" onclick=\"closeModal();re();showTab(\\'reports\\',navBtn(\\'reports\\'))\">Ver Reporte &#x2192;</button></div>';\n    openModal(modal);\n    re();\n  }\n};\nwindow.copyDailyReport=(date)=>{\n  const r=S.savedReports[date];if(!r){alert('Sin reporte guardado para esta fecha');return;}\n  navigator.clipboard.writeText(r.reportText).then(()=>alert('Reporte copiado! Pegalo en WhatsApp.')).catch(()=>alert(r.reportText));\n};\nwindow.deleteSavedReport=(date)=>{\n  if(!confirm('Eliminar este reporte?'))return;\n  delete S.savedReports[date];save();re();\n};\n\n\n// ─── AEP CALENDAR FUNCTIONS ───\nfunction getAEPStatus(){\n  const d=new Date();const y=d.getFullYear();\n  const aepStart=new Date(y,9,15);const aepMktStart=new Date(y,9,1);const aepEnd=new Date(y,11,7);\n  const oepStart=new Date(y,0,1);const oepEnd=new Date(y,2,31);\n  const prepStart=new Date(y,8,1);const aepFinalWeek=new Date(y,11,1);\n  const dStr=d.toISOString().split('T')[0];\n  if(d>=oepStart&&d<=oepEnd){const dl=Math.round((oepEnd-d)/86400000);return{state:'oep',color:'#fff',bg:'linear-gradient(135deg,#20b2a8,#1e3a8a)',icon:'🔄',title:'OEP — Open Enrollment Period',msg:'Cambios MA→MA y MA→Original Medicare permitidos. SEPs disponibles todo el año. '+dl+' días restantes.',urgent:false};}\n  if(d>=aepFinalWeek&&d<=aepEnd){const dl=Math.round((aepEnd-d)/86400000);return{state:'aep-final',color:'#fff',bg:'linear-gradient(135deg,#dc2626,#991b1b)',icon:'🔥',title:'AEP — ÚLTIMA SEMANA · '+dl+' DÍAS RESTANTES',msg:'Máxima intensidad. Toda inscripción efectiva 1 enero. ¡SOAs ya! ¡Cada hora cuenta!',urgent:true};}\n  if(d>=aepStart&&d<=aepEnd){const dl=Math.round((aepEnd-d)/86400000);return{state:'aep-active',color:'#fff',bg:'linear-gradient(135deg,#dc2626,#ea580c)',icon:'⚡',title:'AEP ACTIVO — '+dl+' días hasta 7 de diciembre',msg:'Inscripción anual abierta. Máxima prioridad. SOA REQUERIDO antes de cada cita de ventas.',urgent:true};}\n  if(d>=aepMktStart&&d<aepStart){const dl=Math.round((aepStart-d)/86400000);return{state:'aep-pre',color:'#92400e',bg:'#fef3c7',icon:'📣',title:'AEP — Marketing ABIERTO (Oct 1) · Inscripciones abren en '+dl+' días',msg:'Ya puedes hacer marketing de planes AEP. ¡Inscripciones abren Oct 15! Agenda citas ahora.',urgent:false};}\n  if(d>aepEnd&&d<=new Date(y,11,31)){return{state:'confirm',color:'#fff',bg:'linear-gradient(135deg,#16a34a,#15803d)',icon:'✅',title:'Período de Confirmación AEP',msg:'Confirmar inscripciones, recolectar documentos, llamadas de bienvenida para 1 enero.',urgent:false};}\n  if(d>=prepStart&&d<aepMktStart){const dl=Math.round((aepMktStart-d)/86400000);return{state:'prep',color:'#92400e',bg:'#fef3c7',icon:'⏰',title:'Preparación AEP — '+dl+' días hasta marketing Oct 1',msg:'⚠️ PROHIBIDO marketing AEP hasta Oct 1. Trabaja: T65, SEPs, retención, eventos educativos.',urgent:false};}\n  const nextPrep=new Date(y,8,1);const dl=Math.round((nextPrep-d)/86400000);\n  return{state:'lock',color:'#20b2a8',bg:'#eff6ff',icon:'',title:'Temporada Activa — '+dl+' dias hasta AEP',msg:'T65 y SEPs todo el anio. Cada llamada es un referido potencial.',urgent:false};\n}\nfunction renderAEPBanner(){\n  const s=getAEPStatus();\n  const el=document.getElementById('aepBanner');\n  if(!el)return;\n  el.innerHTML='<div class=\"aep-banner '+( s.urgent?'aep-pulse':'')+'\" style=\"background:'+s.bg+';color:'+(s.color||'#0f172a')+';border:'+(s.state==='lock'||s.state==='prep'?'1px solid #cbd5e1':'none')+'\"><div style=\"display:flex;align-items:center;gap:10px;flex:1\"><div style=\"font-size:22px\">'+s.icon+'<\/div><div><div style=\"font-size:13px;font-weight:900\">'+s.title+'<\/div><div style=\"font-size:11px;opacity:.9;margin-top:2px\">'+s.msg+'<\/div><\/div><\/div><\/div>';\n}\n\n// ─── VIEWS: PROMPTS IA ───\nfunction vPrompts(){\n  const vars=S.promptVars||{};\n  const fp=t=>t.replace(/\\[MIEMBROS\\]/g,vars.miembros||'234').replace(/\\[META\\]/g,vars.meta||'500').replace(/\\[ASEGURADORAS\\]/g,vars.aseguradoras||'[tus portadores]').replace(/\\[AREA\\]/g,vars.area||'[tu area]').replace(/\\[AGENTES\\]/g,vars.agentes||'4').replace(/\\[PRESUPUESTO\\]/g,vars.presupuesto||'[presupuesto]');\n  const prompts=[\n    {num:1,title:'1. Diagnóstico de Situación',when:'Usar: Agosto-Septiembre para planeación de AEP',color:'#20b2a8',bg:'#dbeafe',\ntext:`Actúa como estratega de crecimiento con experiencia directa en corredurías de Medicare Advantage independientes. Entiendes reglas de marketing CMS, avisos TPMO, requisitos SOA y la realidad de venta multi-portador.\n\nMi objetivo: inscribir [META] nuevos miembros MA netos efectivos 1/1/2027, con ventana de venta cerrando 12/7/2026 (AEP). Libro actual: [MIEMBROS].\n\nContexto:\n- Negocio: corredor MA multi-portador independiente\n- Portadores contratados: [ASEGURADORAS]\n- Área de servicio: [AREA]\n- Productores con licencia/AHIP: [AGENTES]\n- Activos: lista de [MIEMBROS] clientes + experiencia en Facebook\n- Presupuesto marketing AEP: [PRESUPUESTO]\n\nDiagnóstica:\n1. Las tres restricciones más grandes que bloquean [META] inscripciones antes del 12/7\n2. Las tres ventajas injustas en las que debo apoyarme\n3. Los riesgos de cumplimiento CMS más probables si escalo rápido\n4. La pregunta más importante que no he respondido todavía\n\nSé directo. No des consejos genéricos. Asume que entiendo el negocio.`},\n    {num:2,title:'2. Perfil del Prospecto Ideal',when:'Usar: Después del diagnóstico, para definir campaña AEP',color:'#8e44ad',bg:'#ede9fe',\ntext:`Basado en mi situación: [MIEMBROS] clientes actuales, portadores [ASEGURADORAS], área [AREA], presupuesto [PRESUPUESTO].\n\nLos prospectos MA caen en buckets con enfoques completamente distintos. Rankea por costo de adquisición y velocidad para MI situación:\n\nA) T65 (cumple 65 en próximos 6 meses) — primer Medicare\nB) En Medicare Original sin MA — target de cambio AEP\nC) En plan MA competidor — target de cambio AEP\nD) Dual-eligible / LIS — elegible SEP todo el año\nE) SEP por mudanza, pérdida de cobertura empleador, u otro\n\nPara mis TOP 2 buckets, dame:\n- Perfil demográfico y psicográfico\n- El evento disparador que los hace listos para hablar con un corredor\n- Dónde están físicamente y en Facebook (intereses específicos)\n- Qué creen actualmente sobre los planes MA (incluyendo lo que creen mal)\n- Las frases exactas que usan — \"Medicare Advantage\" vs \"Part C\" vs \"el plan con la tarjeta para groceries\"\n- Top 3 objeciones específicas de este bucket\n- Qué portadores en [ASEGURADORAS] son más fuertes para este bucket\n\nRecomienda el bucket PRIMARIO para AEP Y el bucket secundario para volumen SEP todo el año.`},\n    {num:3,title:'3. Oferta y Posicionamiento (CMS-Compliant)',when:'Usar: Agosto para preparar creative de AEP',color:'#15803d',bg:'#dcfce7',\ntext:`Diseña el posicionamiento que convierte DENTRO de las reglas CMS para un corredor MA multi-portador en [AREA] con [AGENTES] agentes.\n\nRestricciones absolutas — no violar:\n- No claims de beneficios específicos sin \"no todos los planes, no todas las áreas\"\n- No \"gratis\" sin \"$0 prima para quienes califican\"\n- No logos Medicare/CMS ni implicar respaldo gubernamental\n- No contacto no solicitado — todo debe ser basado en permiso\n- Aviso TPMO requerido (represento múltiples portadores: [ASEGURADORAS])\n- NO incentivos monetarios ligados a inscripción o referido\n\nEntrega:\n1. Declaración de posicionamiento de UNA oración para MÍ como corredor (no un plan) — por qué trabajar conmigo vs llamar al 1-800-MEDICARE. Máx 20 palabras.\n2. Tres variaciones de titular de anuncio Facebook para mi bucket principal — cumplimiento CMS\n3. La \"oferta irresistible\" — qué proveo que un call center no puede (máx 2 que realmente me diferencian)\n4. El texto exacto del aviso TPMO que necesito en cada anuncio y página de aterrizaje\n5. El pitch de 60 segundos para un evento en centro de adultos mayores o iglesia`},\n    {num:4,title:'4. Estrategia de Canales (Realista)',when:'Usar: Agosto para planificar presupuesto y recursos AEP',color:'#e67e22',bg:'#fef3c7',\ntext:`Mapea un plan de canales de adquisición para [META] nuevos miembros antes del 12/7/2026.\n\nPara cada canal, dame:\n- Por qué aplica específicamente a corredores MA (no consejos genéricos)\n- Matemáticas de conversión realistas: impresiones → leads → SOAs → citas → inscripciones\n- Costo por inscripción estimado (benchmark industria: $300–$1,500)\n- Tiempo hasta primera inscripción\n- AEP vs. todo el año\n- Nivel de riesgo cumplimiento CMS (bajo/medio/alto)\n- Esfuerzo 1-5\n\nCubre estos canales:\n1. Reactivación lista envejecida ([MIEMBROS] clientes — referidos, familia T65, cross-sell)\n2. Anuncios lead de Facebook (creative cumplimiento, formulario vs. página aterrizaje)\n3. Eventos comunitarios (centros senior, bibliotecas, iglesias — educativos NO de venta)\n4. Relaciones con médicos de cabecera / consultorios\n5. Alianzas con farmacias independientes\n6. Correo directo a lista T65 (consideraciones de cumplimiento)\n7. Google search ads (alta intención, costoso, pesado en cumplimiento)\n8. Referidos de [MIEMBROS] clientes actuales (qué es legal, qué no)\n9. Un canal no convencional que la mayoría de corredores MA sub-usa\n\nRankea los top 4 por ROI esperado para MI situación. Sé escéptico — dime qué canales suenan bien en webinars pero rara vez producen inscripciones reales.`},\n    {num:5,title:'5. Plan de Campaña AEP (Por Semanas)',when:'Usar: Septiembre para crear el calendario ejecutable',color:'#0891b2',bg:'#e0f2fe',\ntext:`Construye un plan de ejecución semana por semana desde HOY hasta el 12/7/2026, con track separado para trabajo SEP continuando enero-marzo 2027.\n\nUsa el calendario real AEP:\n- Ahora → Sep 30: Pre-AEP — posicionamiento, calentamiento de lista [MIEMBROS], pipeline T65, reserva de eventos, producción de creative, no marketing de planes AEP\n- Oct 1: Marketing AEP puede comenzar (regla CMS — FECHA DURA)\n- Oct 15 – Dic 7: Ventana de venta AEP — máxima intensidad\n- Dic 8 – Dic 31: Confirmación de inscripciones, recolección de documentos, setup retención\n- Ene 1 – Mar 31: OEP + trabajo SEP\n- Abril en adelante: Pipeline T65 + SEP solamente\n\nFormato: Semana | Fase | Canal | Acción específica | Asset necesario | Métrica objetivo\n\nIncluye los assets que necesito: creative FB cumplimiento CMS, página aterrizaje con aviso TPMO, flujo SOA, flujo de agendamiento de citas, secuencia cumpleaños T65, guión de llamada de revisión de clientes actuales.\n\nSeñala las TRES semanas más propensas a fallar y qué causa el fallo.`},\n    {num:6,title:'6. Embudo de Conversión (Específico MA)',when:'Usar: Para optimizar el proceso semana a semana',color:'#db2777',bg:'#fce7f3',\ntext:`Diseña el embudo desde anuncio FB / evento / referido hasta miembro inscrito y retenido.\n\nEtapas específicas MA — no usar lenguaje de embudo genérico:\n1. Conciencia (impresión de anuncio / asistencia a evento / mención de referido)\n2. Captura de lead (formulario / llamada / visita)\n3. SOA firmado (Scope of Appointment — legalmente requerido antes de discutir planes)\n4. Cita de análisis de necesidades (médicos, medicamentos, dentista, presupuesto, beneficios extra)\n5. Comparación de planes y recomendación\n6. Aplicación enviada\n7. Fecha efectiva / tarjeta en mano\n8. Retención 90 días (ventana de des-inscripción rápida)\n9. Revisión anual (renovación / cross-sell)\n\nPara cada etapa:\n- Mensaje más importante\n- Acción que quiero que tomen\n- Métrica que trackeo\n- Razón #1 de abandono y el fix\n\nLuego escribe el copy real para:\n- Texto principal anuncio FB + titular (cumplimiento CMS, sin claims de beneficios específicos)\n- Texto SMS de respuesta a lead (debe enviarse en 5 minutos)\n- Explicación del SOA que no los asuste\n- Email de bienvenida día 3 post-inscripción para prevenir des-inscripción rápida`},\n    {num:7,title:'7. Loop de Crecimiento Compuesto (Legal CMS)',when:'Usar: Para construir el sistema que crece solo sin paid ads',color:'#64748b',bg:'#f1f5f9',\ntext:`Los programas de referidos estándar son ILEGALES en MA (CMS prohíbe incentivos en efectivo o equivalentes a efectivo por inscripción). Diseña un loop de crecimiento compuesto que sea cumplimiento CMS Y que realmente funcione.\n\nMecánicas legales de crecimiento compuesto para corredores MA:\n- Expansión árbol familiar (un cliente → cónyuge, hermanos, padres, cuñados — todos probablemente elegibles Medicare o T65)\n- Relaciones con farmacia / médico de cabecera / SNF que re-refieren continuamente\n- Hosting de eventos educativos → asistentes se convierten en leads + traen amigos\n- Punto de contacto de revisión anual que genera 2-3 nuevos referidos por cliente\n- Pipeline de cumpleaños T65 de familiares de clientes actuales\n- Contenido educativo (sin planes específicos) que genera llamadas inbound\n\nDiseña el loop:\n1. ¿Qué mecánica se compone más rápido para un libro de [MIEMBROS] clientes?\n2. ¿Cuál es la tasa de referidos realista por cliente por año en MA?\n3. ¿Cuál es el sistema operativo (CRM, cadencia de llamadas, guión de revisión anual) que lo hace funcionar sin mi atención constante?\n4. Muestra la matemática: si obtengo X referidos por cliente existente por año, ¿cuándo el libro se sostiene solo sin adquisición pagada?`},\n    {num:9,title:'9. Cómo Mejorar Este Sistema',when:'Usar: Cada semana — revisión del sistema operativo del equipo',color:'#1e2d3d',bg:'#f1f5f9',\ntext:`Eres un estratega de operaciones de ventas con experiencia directa en equipos de corredores Medicare Advantage. Conoces los sistemas que usan los mejores equipos del país y puedes identificar brechas en cualquier operación.\n\nMI SISTEMA ACTUAL — RUMBO 500:\nEquipo: 4 agentes (Isabel manager, Arlette, Skarlett, Samia)\nMeta: 500 miembros Medicare Advantage\nLibro actual: [MIEMBROS] miembros\nHerramientas actuales: Dashboard diario, tracking de llamadas por agente, campañas con pipeline de secuencia, plan diario/semanal/mensual, historial de reportes, biblioteca de secuencias, ARIA AI Manager con contexto del equipo, importación de listas CSV/Notion, retención 30/60/90 días\n\nLo que rastreamos hoy:\n- Llamadas, contestaron, interesados, SOAs, citas, inscritos por agente por día\n- Campañas con contactos y pasos de secuencia\n- Planes diarios con tareas por agente\n- Retención post-inscripción\n- Reportes guardados con notas\n\nANALIZA ESTAS 8 DIMENSIONES Y DIME QUÉ FALTA:\n\n1. DATOS QUE NO ESTAMOS CAPTURANDO\n   ¿Qué métricas debería tener este equipo que no tiene?\n   ¿Qué información sobre cada contacto falta?\n   ¿Qué sobre el comportamiento de los miembros actuales no estamos midiendo?\n   ¿Qué sobre el rendimiento de cada agente no podemos ver todavía?\n\n2. FLUJOS DE TRABAJO ROTOS O LENTOS\n   Basado en cómo trabaja un equipo de ventas Medicare, ¿qué partes del día probablemente tienen fricción?\n   ¿Dónde se pierden oportunidades entre \"interesado\" e \"inscrito\"?\n   ¿Qué proceso toma más tiempo del necesario?\n   ¿Qué debería ser automático pero requiere decisión manual?\n\n3. LO QUE LOS MEJORES EQUIPOS HACEN QUE NOSOTROS NO\n   ¿Qué sistemas tienen los top 10% de corredores Medicare independientes que este equipo probablemente no tiene?\n   ¿Qué prácticas de seguimiento, cadencia o documentación marcan diferencia real en conversión?\n   ¿Qué hace diferente un equipo que cierra 10 al mes vs uno que cierra 3?\n\n4. RIESGOS DEL SISTEMA ACTUAL\n   ¿Qué pasa si un agente se va? ¿Qué información se pierde?\n   ¿Qué pasa si el navegador se borra? (Riesgo real de localStorage)\n   ¿Qué cumplimiento CMS podría estar en riesgo con el sistema actual?\n   ¿Qué podría fallar en AEP cuando el volumen es 3x el normal?\n\n5. PRIORIDADES DE MEJORA EN ORDEN DE IMPACTO\n   Si tuviera que mejorar UNA sola cosa esta semana para el mayor impacto en inscripciones, ¿cuál sería?\n   Dame un ranking de mejoras por: impacto en inscripciones / facilidad de implementar / urgencia\n\n6. LO QUE NO ESTOY PENSANDO\n   ¿Qué pregunta no te hice que debería haber hecho?\n   ¿Qué aspecto del negocio de seguros Medicare estoy ignorando en este sistema?\n   ¿Qué me va a costar más dinero o miembros en los próximos 90 días si no lo atiendo?\n\n7. ESCALABILIDAD\n   Si este equipo pasa de 4 a 8 agentes, ¿qué se rompe primero?\n   ¿Qué parte del sistema no escala?\n   ¿Qué necesitaría cambiar para manejar 2x el volumen?\n\n8. QUICK WINS — ESTA SEMANA\n   Dame 3 cosas específicas que puedo implementar en los próximos 7 días que tengan impacto inmediato en productividad o inscripciones. Sé específico: qué hacer, cómo, por qué funciona.\n\nSé brutalmente honesto. No me digas lo que quiero escuchar — dime lo que necesito saber para llegar a 500 miembros y construir un sistema que funcione sin depender de que yo esté supervisando todo el tiempo.`},\n{num:8,title:'8. Revisión Semanal AEP',when:'Usar: Cada lunes durante AEP (Oct 15 – Dic 7)',color:'#dc2626',bg:'#fee2e2',\ntext:`Aquí están los números de la semana pasada:\n- Leads generados: [#] (FB: [#], eventos: [#], referidos: [#], lista: [#])\n- SOAs firmados: [#]\n- Citas completadas: [#]\n- Aplicaciones enviadas: [#]\n- Inscripciones confirmadas efectivas [fecha]: [#]\n- CPL y CPA por canal: [$]\n- Nuevos miembros netos acumulados hacia [META]: [#]\n\nLo que entregué: [pegar]\nLo que se quedó pendiente: [pegar]\nProblemas de cumplimiento / quejas / reversiones: [pegar]\n\nDime:\n1. ¿Estoy en pace para [META] netos antes del 12/7? Muestra la matemática por semana restante.\n2. ¿Cuál es la UNA acción/canal que debo cambiar esta semana?\n3. ¿Qué debo dejar de hacer?\n4. ¿Qué leads de semanas anteriores estoy dejando en la mesa (sin SOA, sin seguimiento)?\n5. ¿Hay riesgos de cumplimiento en la actividad de la semana pasada que debo corregir antes de que escalen?`}\n  ];\n\n  return`\n  <div class=\"hero\" style=\"background:#1e2d3d\">\n    <h2>🤖 Prompts de IA — Estrategia MA Broker<\/h2>\n    <p>8 prompts especializados para Medicare Advantage. Cópialos a Claude o ChatGPT con tus datos reales. Todo el conocimiento del estratega — listo para usar.<\/p>\n  <\/div>\n\n  <div class=\"card\" style=\"border-color:#20b2a8\">\n    <div class=\"ctitle\">📝 Tus Datos — Se Pre-Llenan en Todos los Prompts<\/div>\n    <div class=\"frow\">\n      <div><label>Miembros Actuales<\/label><input value=\"${vars.miembros||'234'}\" onchange=\"S.promptVars.miembros=this.value;save();re()\"><\/div>\n      <div><label>Meta de Inscripciones<\/label><input value=\"${vars.meta||'500'}\" onchange=\"S.promptVars.meta=this.value;save();re()\"><\/div>\n      <div><label>Portadores (Aseguradoras)<\/label><input value=\"${vars.aseguradoras||''}\" placeholder=\"Humana, UHC, Aetna...\" onchange=\"S.promptVars.aseguradoras=this.value;save();re()\"><\/div>\n    <\/div>\n    <div class=\"frow\">\n      <div><label>Área Geográfica<\/label><input value=\"${vars.area||''}\" placeholder=\"ej. San Fernando Valley, CA\" onchange=\"S.promptVars.area=this.value;save();re()\"><\/div>\n      <div><label>Número de Agentes<\/label><input value=\"${vars.agentes||'4'}\" onchange=\"S.promptVars.agentes=this.value;save();re()\"><\/div>\n      <div><label>Presupuesto AEP<\/label><input value=\"${vars.presupuesto||''}\" placeholder=\"ej. $2,000/mes\" onchange=\"S.promptVars.presupuesto=this.value;save();re()\"><\/div>\n    <\/div>\n  <\/div>\n\n  ${prompts.map((p,i)=>`\n  <div style=\"background:#fff;border:1px solid ${p.bg};border-left:4px solid ${p.color};border-radius:12px;padding:14px;margin-bottom:10px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px\">\n      <div>\n        <div style=\"font-size:13px;font-weight:900;color:${p.color}\">${p.title}<\/div>\n        <div style=\"font-size:10px;c ight:700;color:'+(isDone?'#27ae60':'#8098b3')+'\">';\n      h+='<input type=\"checkbox\" id=\"sc_'+i+'\" '+(isDone?'checked':'')+' onchange=\"window._toggleStep('+i+')\" style=\"width:16px;height:16px;cursor:pointer;accent-color:#27ae60\">';\n      h+(isDone?'Hecho':'Marcar hecho');\n      h+='<\/label>';\n      h+='<button onclick=\"window._delStep('+i+')\" style=\"padding:4px 10px;border:1px solid #fca5a5;border-radius:6px;background:#fff;color:#dc2626;cursor:pointer;font-size:11px;flex-shrink:0\">✕<\/button>';\n      h+='<\/div>';\n      // Script textarea\n      h+='<div style=\"padding:0 14px 12px\">';\n      h+='<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px\">';\n      h+='<div><label style=\"font-size:10px;font-weight:700;color:#8098b3;display:block;margin-bottom:4px\">Días desde inicio (0 = primer día)<\/label>';\n      h+='<input type=\"number\" min=\"0\" id=\"sdays_'+i+'\" value=\"'+(s.days||0)+'\" style=\"width:100%;font-size:13px;font-weight:700;border:1px solid #d1dce6;border-radius:6px;padding:6px 10px\"><\/div>';\n      h+='<div><label style=\"font-size:10px;font-weight:700;color:#8098b3;display:block;margin-bottom:4px\">Fecha completado<\/label>';\n      h+='<input type=\"date\" id=\"sdd_'+i+'\" value=\"'+(s.doneDate||'')+'\" style=\"width:100%;font-size:12px;padding:6px 8px;border:1px solid #d1dce6;border-radius:6px\"><\/div>';\n      h+='<\/div>';\n      h+='<div style=\"margin-top:8px\"><label style=\"font-size:10px;font-weight:700;color:#8098b3;display:block;margin-bottom:4px\">Guión (qué decir)<\/label>';\n      h+='<textarea id=\"ssc_'+i+'\" rows=\"2\" style=\"width:100%;font-size:12px;padding:8px;border:1px solid #d1dce6;border-radius:6px;resize:vertical\">'+( s.script||'')+'<\/textarea><\/div>';\n      h+='<div style=\"margin-top:6px\"><label style=\"font-size:10px;font-weight:700;color:#e67e22;display:block;margin-bottom:4px\">⚠️ Nota importante<\/label>';\n      h+='<input id=\"stip_'+i+'\" value=\"'+(s.tip \n      else if(outcome==='appt')ct.status='appointed';\n      else ct.status='active';}\n  } else {\n    if(outcome==='enrolled')ct.status='enrolled';\n    else if(outcome==='interested'||outcome==='replied_interested')ct.status='interested';\n    else if(outcome==='appt')ct.status='appointed';\n    else if(outcome==='declined'||outcome==='replied_no')ct.status='dropped';\n  }\n  if(!S.logs)S.logs={};\n  var lk=todayStr+'_'+c.agent;\n  if(!S.logs[lk])S.logs[lk]={date:todayStr,agent:c.agent,calls:0,interested:0,appts:0,enrolled:0};\n  S.logs[lk].calls=(S.logs[lk].calls||0)+1;\n  if(outcome==='interested'||outcome==='replied_interested')S.logs[lk].interested=(S.logs[lk].interested||0)+1;\n  if(outcome==='appt')S.logs[lk].appts=(S.logs[lk].appts||0)+1;\n  if(outcome==='enrolled')S.logs[lk].enrolled=(S.logs[lk].enrolled||0)+1;\n  save();closeModal();re();\n  toast(advance?'Guardado y avanzado':'Guardado');\n};\n\nfunction re(){\n  const views={home:vHome,agente:vAgente,mes:vMes,today:vToday,campaigns:vCampaigns,week:vWeek,reports:vReports,referrals:vReferrals,retention:vRetention,history:vHistory,strategy:vStrategy,scripts:vScripts,objections:vObjections,daily:vDailyPlan,prime:vPrime,prompts:vPrompts,compliance:vCompliance,library:vLibrary,tareas:vTareas};\n  try{document.getElementById('view').innerHTML=views[S.tab]?views[S.tab]():'';}catch(err){document.getElementById('view').innerHTML='<div style=\"padding:20px;color:#dc2626;font-size:13px;font-weight:700;background:#fdecea;border-radius:8px;margin:20px\">'+'Error en tab \"'+S.tab+'\": '+err.message+'<br><small style=\"opacity:.7\">'+err.stack+'<\/small><\/div>';console.error('view error:',err);};\n  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===S.tab));\n  // Highlight group buttons for active sub-tabs\n  const _grpMap={daily:'grp-plan',mes:'grp-plan',week:'grp-plan',today:'grp-nums',reports:'grp-nums',history:'grp-nums',campaigns:'grp-work',referrals:'grp-work',retention:'grp-w function buildProtocolWidget(){
  var leads=(S.pipeline&&S.pipeline.leads)||[];
  var today=new Date().toISOString().slice(0,10);
  // Find members who enrolled and need follow-up calls today
  var calls=[];
  leads.forEach(function(l){
    if(l.stage!=='Inscrito'||!l.enrollDate)return;
    var enrolled=new Date(l.enrollDate+'T12:00:00');
    var daysSince=Math.round((new Date()-enrolled)/86400000);
    var checkpoints=[1,15,30,90];
    checkpoints.forEach(function(cp){
      if(daysSince>=cp&&daysSince<cp+3){
        calls.push({name:l.name,day:cp,daysSince:daysSince,assignedTo:l.assignedTo});
      }
    });
  });
  var h='<div class="card" style="border-left:4px solid #7C3AED">';
  h+='<div class="flex jb ac mb12"><div class="ct" style="margin:0;color:#7C3AED">📞 Protocolo Day 1/15/30/90</div>';
  h+='<span style="font-size:11px;font-weight:700;background:#F5F3FF;color:#7C3AED;padding:2px 8px;border-radius:99px">'+calls.length+' llamadas hoy</span></div>';
  if(!calls.length){
    h+='<div style="text-align:center;font-size:12px;color:#C7C7CC;padding:12px">No hay llamadas de protocolo pendientes hoy</div>';
  } else {
    calls.slice(0,5).forEach(function(c){
      var agent=c.assignedTo?tm(c.assignedTo):null;
      h+='<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #F5F5F7">';
      h+='<div style="background:#7C3AED;color:#fff;border-radius:6px;padding:3px 7px;font-size:9px;font-weight:800;flex-shrink:0">Day '+c.day+'</div>';
      h+='<div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(c.name)+'</div>';
      if(agent)h+='<div style="font-size:10px;color:#8E8E93">→ '+agent.name+'</div>';
      h+='</div>';
      h+='<span style="font-size:10px;color:#7C3AED;font-weight:600">Día '+c.daysSince+'</span>';
      h+='</div>';
    });
    if(calls.length>5)h+='<div style="font-size:11px;color:#8E8E93;text-align:center;margin-top:6px">+'+(calls.length-5)+' más en el pipeline</div>';
  }
  h+='<div style="margin-top:8px;font-size:10px;color:#C7C7CC">Las fechas se calculan desde el campo "Fecha de Inscripción" de cada lead</div>';
  h+='</div>';
  return h;
}

async function wsSend(id){
  var inp=E('ws-inp-'+id);var text=inp?inp.value.trim():'';if(!text)return;
  wsAddMsg(id,'user',text);if(inp)inp.value='';
  var p=WS.filter(function(x){return x.id===id;})[0];
  var msgs=E('ws-msgs-'+id);
  var t=document.createElement('div');t.className='cmsg';t.id='ws-t-'+id;
  t.innerHTML='<div style="width:28px;height:28px;border-radius:7px;background:'+p.color+'18;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">'+p.icon+'</div><div class="typing"><div class="db" style="background:'+p.color+'"></div><div class="db" style="background:'+p.color+'"></div><div class="db" style="background:'+p.color+'"></div></div>';
  if(msgs){msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
  // Build conversation history
  var history=(wsMsgs[id]||[]).slice(-6).filter(function(m){return m.r==='user'||m.r==='bot';}).reduce(function(arr,m,i,all){
    if(m.r==='user')arr.push({role:'user',content:m.t});
    else if(m.r==='bot'&&arr.length)arr.push({role:'assistant',content:m.t});
    return arr;
  },[]);
  // Ensure last message is the current user message
  if(!history.length||history[history.length-1].role!=='user')history.push({role:'user',content:text});
  var systemPrompt=buildWsAriaPrompt(id);
  var response=await callClaude(systemPrompt,history);
  var t2=E('ws-t-'+id);if(t2)t2.remove();
  wsAddMsg(id,'bot',response);
}

function getTimelog(mid){if(!S.timeLog)S.timeLog={};var today=new Date().toISOString().slice(0,10);if(!S.timeLog[today])S.timeLog[today]={};if(!S.timeLog[today][String(mid)])S.timeLog[today][String(mid)]={events:[]};return S.timeLog[today][String(mid)];}
function clockEvent(mid,type){
  var tl=getTimelog(mid);var now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  if(!tl.events)tl.events=[];tl.events.push({type:type,time:now,ts:Date.now()});
  if(type==='out'){
    var h=calcNetHours(tl.events);tl.netHours=h;
    if(!S.hoursLog)S.hoursLog={};var today=new Date().toISOString().slice(0,10);
    if(!S.hoursLog[today])S.hoursLog[today]={};S.hoursLog[today][String(mid)]=h;
    // Auto-generate and save EOD report to history
    saveEODReport(mid,today,h);
  }
  saveS();rWSBody(mid);
}
function saveEODReport(mid,date,hours){
  var member=tm(mid);if(!member)return;
  if(!S.reports)S.reports=[];
  var acts=getPersonalActs(mid);
  var doneList=getDoneList(mid,date);
  var completed=doneList.map(function(id){return acts.find(function(a){return a.id===id;});}).filter(Boolean);
  var pending=acts.filter(function(a){return doneList.indexOf(a.id)<0;});
  var ci=(S.checkins&&S.checkins[mid])||{};
  var ciDone=['morning','midday','eod'].filter(function(m){return ci[m]&&ci[m].done;}).length;
  var myTickets=(S.tickets&&S.tickets.items||[]).filter(function(t){return t.assignedTo===mid&&t.resolvedDate===date;}).length;
  var myPipe=(S.pipeline&&S.pipeline.leads||[]).filter(function(l){return l.assignedTo===mid&&l.stage!=='Inscrito'&&l.stage!=='No Calificó';}).length;
  var rate=parseFloat(S.payroll&&S.payroll.hourlyRate&&S.payroll.hourlyRate[String(mid)])||0;
  var pctActs=acts.length?Math.round(doneList.length/acts.length*100):0;
  var report={
    id:uid(),mid:mid,date:date,ts:Date.now(),
    name:member.name,role:member.role,
    hours:hours,pctActs:pctActs,
    completedActs:completed.length,totalActs:acts.length,
    pendingActs:pending.map(function(a){return a.name;}),
    completedList:completed.map(function(a){return a.name;}),
    checkins:ciDone,tickets:myTickets,pipeline:myPipe,
    lps:Math.round(hours*rate),
    ciDetail:{
      morning:ci.morning||{},
      midday:ci.midday||{},
      eod:ci.eod||{}
    }
  };
  // Remove old report for same day+member if exists
  S.reports=S.reports.filter(function(r){return !(r.mid===mid&&r.date===date);});
  S.reports.unshift(report);
  // Keep last 90 days only
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-90);var cutKey=cutoff.toISOString().slice(0,10);
  S.reports=S.reports.filter(function(r){return r.date>=cutKey;});
  saveS();
  toast('📊 Reporte del día guardado — '+member.name);
}
// Manually save daily report for a person from the Reloj tab
function saveCompReport(mid){
  var today=new Date().toISOString().slice(0,10);
  var tl=getTimelog(mid);
  var h=tl.netHours||0;
  if(!h&&tl.events&&tl.events.length)h=calcNetHours(tl.events);
  if(!h)h=(S.hoursLog&&S.hoursLog[today]&&S.hoursLog[today][String(mid)])||0;
  if(h&&!tl.netHours){
    if(!S.hoursLog)S.hoursLog={};
    if(!S.hoursLog[today])S.hoursLog[today]={};
    S.hoursLog[today][String(mid)]=h;
  }
  saveEODReport(mid,today,h);

function getQuincena(){
  var today=new Date();
  var d=today.getDate();var m=today.getMonth();var y=today.getFullYear();
  var start,end,label;
  if(d<=15){
    start=new Date(y,m,1);end=new Date(y,m,15);
    label='1–15 '+today.toLocaleString('es',{month:'long'})+' '+y;
  }else{
    start=new Date(y,m,16);end=new Date(y,m+1,0);
    label='16–'+end.getDate()+' '+today.toLocaleString('es',{month:'long'})+' '+y;
  }
  return {start:start,end:end,label:label};
}


function getHoursInPeriod(mid,start,end){
  if(!S.hoursLog)return 0;
  var total=0;
  Object.keys(S.hoursLog).forEach(function(date){
    var d=new Date(date+'T12:00:00');
    if(d>=start&&d<=end){total+=(parseFloat(S.hoursLog[date][String(mid)])||0);}
  });
  return total;
}


function saveRate(mid){
  var v=E('_rate-'+mid);if(!v)return;
  if(!S.payroll.hourlyRate)S.payroll.hourlyRate={};
  S.payroll.hourlyRate[String(mid)]=parseFloat(v.value)||0;
  saveS();rComp();toast('Tarifa guardada ✓');
}

async function generateEODReport(mid){
  var member=tm(mid);if(!member)return;
  var today=new Date().toISOString().slice(0,10);
  var todayLabel=new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});
  var acts=getPersonalActs(mid);
  var doneList=getDoneList(mid,today);
  var completed=doneList.map(function(id){return acts.find(function(a){return a.id===id;});}).filter(Boolean);
  var pending=acts.filter(function(a){return doneList.indexOf(a.id)<0;});
  var tl=getTimelog(mid);
  var hours=tl.netHours||((S.hoursLog&&S.hoursLog[today]&&S.hoursLog[today][String(mid)])||0);
  var ci=(S.checkins&&S.checkins[mid])||{};
  var ciDone=['morning','midday','eod'].filter(function(m){return ci[m]&&ci[m].done;}).length;
  var todayTickets=((S.tickets&&S.tickets.items)||[]).filter(function(t){return t.assignedTo===mid&&t.resolvedDate===today;}).length;
  var myPipe=((S.pipeline&&S.pipeline.leads)||[]).filter(function(l){return l.assignedTo===mid&&l.stage!=='Inscrito'&&l.stage!=='No Calificó';}).length;

  var context='Genera un REPORTE EJECUTIVO DE FIN DE DÍA para '+member.name+' ('+member.role+') — '+todayLabel+'.\n\n';
  context+='DATOS DEL DÍA:\n';
  context+='• Horas trabajadas: '+hours+'h\n';
  context+='• Actividades completadas: '+completed.length+'/'+acts.length+' ('+Math.round(completed.length/(acts.length||1)*100)+'%)\n';
  context+='• Check-ins: '+ciDone+'/3\n';
  context+='• Tickets resueltos: '+todayTickets+'\n';
  context+='• Pipeline activo: '+myPipe+' leads\n';
  if(ci.morning&&ci.morning.plan)context+='• Plan mañana: '+ci.morning.plan+'\n';
  if(ci.eod&&ci.eod.resumen)context+='• Resumen EOD: '+ci.eod.resumen+'\n';
  context+='\nACTIVIDADES COMPLETADAS:\n'+completed.slice(0,10).map(function(a){return '✓ '+a.name;}).join('\n')+'\n\n';
  if(pending.length)context+='ACTIVIDADES PENDIENTES:\n'+pending.slice(0,5).map(function(a){return '— '+a.name;}).join('\n')+'\n\n';
  context+='GENERA UN REPORTE (200-300 palabras) que incluya:\n1. Logros del día\n2. Áreas de mejora\n3. Prioridades para mañana\n4. Mensaje motivacional para '+member.name+'\nTono: profesional pero cálido. En español.';

  showTab('aria',navBtn('aria'));
  setTimeout(async function(){
    addAriaMsg('user','📊 Generar reporte EOD — '+member.name+' — '+todayLabel);
    var msgs=E('aria-msgs');
    var t=document.createElement('div');t.className='cmsg';t.id='aria-t';
    t.innerHTML='<div style="width:30px;height:30px;border-radius:8px;background:#CCFBF1;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div><div class="typing"><div class="db"></div><div class="db"></div><div class="db"></div></div>';
    if(msgs){msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
    var response=await callClaude(buildAriaSystemPrompt(),[{role:'user',content:context}]);
    var t2=E('aria-t');if(t2)t2.remove();
    addAriaMsg('bot',response);
    // Save EOD report text to history and reports
    if(!S.activityHistory)S.activityHistory={};
    var key=today+'_'+String(mid);
    if(!S.activityHistory[key])S.activityHistory[key]={date:today,mid:mid,acts:{},checkins:{}};
    S.activityHistory[key].eodReport=response;
    S.activityHistory[key].reportGeneratedAt=new Date().toISOString();
    // Also push to S.reports if not already saved today
    saveEODReport(mid,today,hours);
    saveS();
    toast('📊 Reporte EOD guardado ✓');
  },500);
}

async function submitExam(mid, week) {
  var exam = TRAINING_EXAMS[week];
  if (!exam) return;
  var key = 'exam_'+week+'_'+mid;
  var member = tm(mid);
  
  // Collect answers
  var answers = [];
  var autoScore = 0;
  var totalChoice = 0;
  
  exam.preguntas.forEach(function(p, pi) {
    var qkey = key+'_q'+pi;
    if (p.tipo === 'choice') {
      totalChoice++;
      var radios = document.querySelectorAll('input[name="'+qkey+'"]:checked');
      var selected = radios.length ? parseInt(radios[0].value) : -1;
      var correct = selected === p.correcta;
      if (correct) autoScore++;
      answers.push({q:p.q, selected: selected>=0 ? p.opciones[selected] : 'Sin respuesta', correct:correct, correcta:p.opciones[p.correcta]});
    } else {
      var el = document.getElementById(qkey);
      answers.push({q:p.q, texto: el ? el.value : '', tipo:'abierta'});
    }
  });

  var choicePct = totalChoice ? Math.round(autoScore/totalChoice*100) : 0;
  var wrongAnswers = answers.filter(function(a){return a.tipo!=='abierta'&&!a.correct;});
  var openAnswers = answers.filter(function(a){return a.tipo==='abierta';});

  // Ask ARIA to grade open questions and give overall feedback
  var prompt = 'Califica el examen de '+member.name+' sobre "'+exam.tema+'".\n\nRespuestas de opción múltiple: '+autoScore+'/'+totalChoice+' correctas ('+choicePct+'%).\n\nPreguntas que respondió MAL:\n'+wrongAnswers.map(function(a){return '- '+a.q+'\n  Respondió: "'+a.selected+'"\n  Correcta: "'+a.correcta+'"';}).join('\n')+'\n\nRespuestas abiertas (califica del 1-10 cada una):\n'+openAnswers.map(function(a){return '- '+a.q+'\n  Respuesta: "'+a.texto+'"';}).join('\n')+'\n\nDa:\n1. Calificación final estimada (0-100)\n2. Feedback directo de 2-3 oraciones para '+member.name+'\n3. 1 cosa que debe repasar\n\nResponde SOLO en este formato JSON exacto:\n{"score":85,"feedback":"Muy bien en los conceptos de red. Repasa la parte de...","repaso":"Diferencia entre HMO y PPO"}';

  toast('Enviando a ARIA...');
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    if(!response.ok){
      var errBody=await response.text();
      throw new Error('HTTP '+response.status+': '+errBody.slice(0,200));
    }
    var data = await response.json();
    if(!data.content||!data.content[0]||!data.content[0].text){
      throw new Error('Respuesta de API sin contenido');
    }
    var text = data.content[0].text;
    var clean = text.replace(/```json|```/g,'').trim();
    var result = JSON.parse(clean);
    if(typeof result.score!=='number')throw new Error('JSON inválido de ARIA');
    _examAnswers[key] = {graded:true, score:result.score, feedback:result.feedback||'', repaso:result.repaso||'', answers:answers};
  } catch(e) {
    console.error('Exam grading API error:', e);
    // Fallback if API fails
    _examAnswers[key] = {graded:true, score:choicePct, feedback:'Puntaje basado en opción múltiple. Respuestas abiertas: revisa con Isabel. (No se pudo conectar a ARIA para calificar las preguntas abiertas — verifica tu conexión.)', repaso:'', answers:answers};
  }
  saveS();
  
  // Notify Isabel via ARIA
  var finalScore = _examAnswers[key].score;
  var grade = finalScore>=90?'A':finalScore>=75?'B':finalScore>=60?'C':finalScore>=40?'D':'F';
  saveAriaExchange('Examen Semana '+week+' — '+member.name+': '+grade+' ('+finalScore+'%)', _examAnswers[key].feedback);
  
  rWSBody(mid);
  toast('Examen calificado: '+grade+' ('+finalScore+'%) ✓');
}

function retakeExam(key) {
  delete _examAnswers[key];
  saveS();
  // find mid from key
  var parts = key.split('_');
  var mid = parseInt(parts[parts.length-1]);
  rWSBody(mid);
}

// Call Claude API
async function callClaude(systemPrompt, messages){
  try{
    var apiKey=S.ariaKey||'';
    if(!apiKey){
      // Prompt for key once and save
      apiKey=prompt('Ingresa tu API Key de Anthropic para activar ARIA:\n(sk-ant-...)');
      if(!apiKey||!apiKey.startsWith('sk-'))return 'API Key inválida. Ingresa una key válida de Anthropic.';
      S.ariaKey=apiKey.trim();saveS();
    }
    var response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1024,
        system:systemPrompt,
        messages:messages
      })
    });
    if(!response.ok){
      var errBody=await response.text();
      console.error('Claude API HTTP '+response.status+':',errBody);
      if(response.status===401){S.ariaKey='';saveS();return 'API Key inválida o vencida. Recarga la página para ingresar una nueva.';}
      if(response.status===429)return 'ARIA está saturada ahora mismo (límite de uso). Intenta en un momento.';
      if(response.status>=500)return 'El servicio de ARIA está caído temporalmente. Intenta en unos minutos.';
      return 'No pude conectar con ARIA (error '+response.status+'). Intenta de nuevo.';
    }
    var data=await response.json();
    if(data.error){console.error('Claude API error:',data.error);return 'ARIA reportó un error: '+(data.error.message||'desconocido')+'. Intenta de nuevo.';}
    if(data.content&&data.content[0]&&data.content[0].text)return data.content[0].text;
    return 'Disculpa, tuve un problema procesando esa pregunta. ¿Puedes intentar de nuevo?';
  }catch(e){
    console.error('callClaude error:',e);
    if(e.message&&e.message.indexOf('Failed to fetch')>=0)return 'Sin conexión a internet. Verifica tu red e intenta de nuevo.';
    return 'No pude conectar al servicio de AI ('+e.message+'). Verifica tu conexión e intenta de nuevo.';
  }
}

  if(!text)return;

// INTELLIGENCE LAYER — Auto-detection of issues and opportunities
// Nothing gets forgotten. Goals stay top-of-mind. Girls are reminded.
// ═══════════════════════════════════════════════════════════════════

// Detect everything that needs attention RIGHT NOW
function detectIntelligence(){
  var today = new Date();
  var todayKey = today.toISOString().slice(0,10);
  var dow = today.getDay();
  var monday = new Date(); monday.setDate(monday.getDate()-((dow+6)%7));
  var mondayKey = monday.toISOString().slice(0,10);
  var eKey = today.toISOString().slice(0,7);
  var alerts = [];
  var leads=(S.pipeline&&S.pipeline.leads)||[];

  // ── DAY 1/15/30/90 PROTOCOL ALERTS ──────────────────────────────
  var protoCalls=[];
  leads.forEach(function(l){
    if(l.stage!=='Inscrito'||!l.enrollDate)return;
    var enrolled=new Date(l.enrollDate+'T12:00:00');
    var daysSince=Math.round((today-enrolled)/86400000);
    [1,15,30,90].forEach(function(cp){
      if(daysSince>=cp&&daysSince<cp+2){
        protoCalls.push({name:l.name,day:cp,assignedTo:l.assignedTo});
      }
    });
  });
  if(protoCalls.length){
    alerts.push({
      severity:'critical',icon:'📞',
      title:protoCalls.length+' llamadas del Protocolo Day '+protoCalls.map(function(c){return c.day;}).filter(function(v,i,a){return a.indexOf(v)===i;}).join('/')+' pendientes HOY',
      detail:protoCalls.slice(0,3).map(function(c){var a=c.assignedTo?tm(c.assignedTo):null;return c.name+' (Day '+c.day+')'+(a?' → '+a.name:'');}).join(' · '),
      action:'Ver protocolo',link:'dash'
    });
  }

  // ── PIPELINE BOTTLENECK PREDICTION ──────────────────────────────
  var activeLeads=leads.filter(function(l){return l.stage!=='Inscrito'&&l.stage!=='No Calificó';});
  MEMBERS.forEach(function(p){
    var myLeads=activeLeads.filter(function(l){return l.assignedTo===p.id;});
    var myEnroll=(S.enrollments&&S.enrollments[eKey]&&S.enrollments[eKey][String(p.id)])||0;
    // If agent has >15 active leads and <3 enrolled this month = bottleneck
    if(myLeads.length>15&&myEnroll<3){
      alerts.push({
        severity:'high',icon:'⚠️',
        title:p.name+' tiene cuello de botella en pipeline',
        detail:myLeads.length+' leads activos pero solo '+myEnroll+' inscritos este mes. Posible problema en cierre o capacidad.',
        action:'Revisar pipeline',link:'pipe',forMid:p.id
      });
    }
    // Hot leads not contacted in 48h
    var hotStale=myLeads.filter(function(l){
      if(!l.hot||!l.date)return false;
      return (today-new Date(l.date+'T12:00:00'))/3600000>48;
    });
    if(hotStale.length){
      alerts.push({
        severity:'high',icon:'🔥',
        title:p.name+': '+hotStale.length+' lead(s) caliente(s) sin contacto +48h',
        detail:hotStale.slice(0,2).map(function(l){return l.name;}).join(', '),
        action:'Llamar ahora',link:'pipe',forMid:p.id
      });
    }
  });

  // ── OVERDUE TICKETS ──────────────────────────────────────────────
  var overdue = ((S.tickets&&S.tickets.items)||[]).filter(function(t){
    return t.status!=='resuelto' && t.date && t.date < mondayKey;
  });
  if(overdue.length){
    alerts.push({
      severity:'critical',icon:'🎫',
      title:overdue.length+' tickets atrasados del CRM',
      detail:overdue.slice(0,3).map(function(t){var ap=t.assignedTo?tm(t.assignedTo):null;return t.title+(ap?' ('+ap.name+')':'');}).join(' · '),
      action:'Revisar tickets',link:'tickets',forMid:overdue[0].assignedTo||null
    });
  }

  // ── NO MORNING CHECK-IN ──────────────────────────────────────────
  MEMBERS.forEach(function(p){
    var ci = (S.checkins&&S.checkins[p.id])||{};
    var hour = today.getHours();
    if(hour >= 9 && (!ci.morning || !ci.morning.done)){
      alerts.push({
        severity:'high',icon:'☀️',
        title:p.name+' sin check-in matutino',
        detail:'Son las '+today.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})+'. El check-in de mañana no fue marcado.',
        action:'Recordarle',forMid:p.id
      });
    }
  });

  // ── ACTIVITIES BEHIND (by 2pm) ───────────────────────────────────
  if(today.getHours() >= 14){
    MEMBERS.forEach(function(p){
      var todayActs = actsForDay(p.id, dow);
      var done = (S.wsActDone&&S.wsActDone[todayKey]&&S.wsActDone[todayKey][String(p.id)])||[];
      var pct = todayActs.length ? Math.round(done.length/todayActs.length*100) : 0;
      if(pct < 50 && todayActs.length > 0){
        alerts.push({
          severity:'medium',icon:'📋',
          title:p.name+' va atrasada en sus actividades',
          detail:done.length+'/'+todayActs.length+' completadas ('+pct+'%) — son las '+today.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),
          action:'Ofrecer apoyo',forMid:p.id
        });
      }
    });
  }

  // ── GOALS AT RISK (under 40%) ────────────────────────────────────
  var atRisk = (S.pg||[]).filter(function(g){return !g.done && (g.progress||0) < 40;});
  if(atRisk.length){
    alerts.push({
      severity:'medium',icon:'🎯',
      title:atRisk.length+' metas personales en riesgo (bajo 40%)',
      detail:atRisk.slice(0,3).map(function(g){var p=tm(g.mid);return (p?p.name:'?')+': '+g.title.slice(0,35);}).join(' · '),
      action:'Revisar en 1:1'
    });
  }

  // ── TRAINING EXAM ────────────────────────────────────────────────
  if(dow >= 3 && typeof TRAINING_CALENDAR !== 'undefined'){
    var weekIdx = _trainingWeek || 0;
    MEMBERS.forEach(function(p){
      var key = 'exam_'+(weekIdx+1)+'_'+p.id;
      if(!_examAnswers || !_examAnswers[key] || !_examAnswers[key].graded){
        alerts.push({
          severity:'medium',icon:'🎓',
          title:p.name+' no ha completado el examen semanal',
          detail:'Tema: '+(TRAINING_CALENDAR[weekIdx]?TRAINING_CALENDAR[weekIdx].tema:'')+'. Hoy es '+['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][dow],
          action:'Ver examen',forMid:p.id
        });
      }
    });
  }

  // ── ENROLLMENT PACE ──────────────────────────────────────────────
  var totalEnroll = 0;
  Object.keys((S.enrollments&&S.enrollments[eKey])||{}).forEach(function(k){totalEnroll+=(S.enrollments[eKey][k]||0);});
  var dayOfMonth = today.getDate();
  var daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  var expectedByNow = Math.round(31 * dayOfMonth / daysInMonth);
  if(totalEnroll < expectedByNow * 0.7){
    alerts.push({
      severity:'high',icon:'📈',
      title:'Inscripciones del mes detrás del ritmo',
      detail:totalEnroll+' inscritos · meta del día: '+expectedByNow+' · meta mensual: 31',
      action:'Acelerar pipeline',link:'pipe'
    });
  }

  // ── STALE NEW LEADS (>24h sin contacto) ─────────────────────────
  var staleLeads = leads.filter(function(l){
    if(l.stage==='Inscrito'||l.stage==='No Calificó')return false;
    if(!l.date)return false;
    return l.stage==='Nuevo Lead' && (today-new Date(l.date+'T12:00:00'))/3600000 > 24;
  });
  if(staleLeads.length){
    alerts.push({
      severity:'high',icon:'⏰',
      title:staleLeads.length+' leads nuevos sin contactar más de 24h',
      detail:'SLA es 60 minutos. '+staleLeads.slice(0,2).map(function(l){return l.name;}).join(', '),
      action:'Asignar y llamar',link:'pipe'
    });
  }

  // ── CELEBRATE WINS ───────────────────────────────────────────────
  MEMBERS.forEach(function(p){
    var todayActs = actsForDay(p.id, dow);
    var done = (S.wsActDone&&S.wsActDone[todayKey]&&S.wsActDone[todayKey][String(p.id)])||[];
    var pct = todayActs.length ? Math.round(done.length/todayActs.length*100) : 0;
    var myE=(S.enrollments&&S.enrollments[eKey]&&S.enrollments[eKey][String(p.id)])||0;
    if(pct >= 90 && todayActs.length >= 5){
      alerts.push({
        severity:'celebrate',icon:'🎉',
        title:'¡'+p.name+' completó el 90%+ de sus actividades!',
        detail:done.length+'/'+todayActs.length+' actividades · '+myE+' inscripciones este mes',
        action:'Celebrar',forMid:p.id
      });
    }
  });
  return alerts;
}

// PERSONAL COACH — greets each girl with priorities, reminds them
// ═══════════════════════════════════════════════════════════════════

function buildPersonalCoach(mid){
  var p = tm(mid); if(!p) return '';
  var today = new Date();
  var todayKey = today.toISOString().slice(0,10);
  var dow = today.getDay();
  var hour = today.getHours();
  var eKey = today.toISOString().slice(0,7);
  
  // Calculate this person's status
  var todayActs = actsForDay(mid, dow);
  var done = (S.wsActDone&&S.wsActDone[todayKey]&&S.wsActDone[todayKey][String(mid)])||[];
  var pct = todayActs.length ? Math.round(done.length/todayActs.length*100) : 0;
  var ci = (S.checkins&&S.checkins[mid])||{};
  var checkedIn = ci.morning && ci.morning.done;
  var myT = ((S.tickets&&S.tickets.items)||[]).filter(function(t){return t.assignedTo===mid&&t.status!=='resuelto';});
  var monday = new Date(); monday.setDate(monday.getDate()-((dow+6)%7));
  var mondayKey = monday.toISOString().slice(0,10);
  var overdueT = myT.filter(function(t){return t.date&&t.date<mondayKey;});
  var myE = (S.enrollments&&S.enrollments[eKey]&&S.enrollments[eKey][String(mid)])||0;
  var weekIdx = (typeof _trainingWeek!=='undefined') ? _trainingWeek : 0;
  var examKey = 'exam_'+(weekIdx+1)+'_'+mid;
  var examDone = _examAnswers && _examAnswers[examKey] && _examAnswers[examKey].graded;
  
  // Build greeting
  var greeting;
  if(hour < 12) greeting = '☀️ Buenos días, '+p.name;
  else if(hour < 18) greeting = '👋 Buenas tardes, '+p.name;
  else greeting = '🌙 Buenas noches, '+p.name;
  
  // Build priorities
  var priorities = [];
  if(!checkedIn && hour < 18) priorities.push({icon:'☀️', text:'Hacer check-in matutino', urgent:true});
  if(overdueT.length) priorities.push({icon:'🚨', text:overdueT.length+' ticket'+(overdueT.length>1?'s':'')+' atrasado'+(overdueT.length>1?'s':'')+': '+overdueT[0].title.slice(0,30)+(overdueT.length>1?'...':''), urgent:true});
  if(todayActs.length && pct < 100) priorities.push({icon:'📋', text:(todayActs.length-done.length)+' actividades pendientes hoy ('+pct+'%)', urgent:pct<50});
  if(typeof TRAINING_CALENDAR !=='undefined' && TRAINING_CALENDAR[weekIdx] && !examDone && dow >= 3) priorities.push({icon:'🎓', text:'Examen pendiente: '+TRAINING_CALENDAR[weekIdx].tema, urgent:dow>=5});
  
  // Build encouragement based on data
  var encouragement = '';
  if(pct >= 80) encouragement = '🎉 Vas excelente hoy. ¡Sigue así!';
  else if(myE >= 3) encouragement = '🚀 '+myE+' inscripciones este mes. Estás haciéndola.';
  else if(priorities.length === 0) encouragement = '✨ Todo al día. Eres una rockstar.';
  
  var h = '<div style="background:linear-gradient(135deg,'+p.color+'15,'+p.color+'05);border:1.5px solid '+p.color+'33;border-radius:14px;padding:14px 16px;margin-bottom:12px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">';
  h += '<div><div style="font-size:14px;font-weight:800;color:'+p.color+';font-family:Georgia,serif">'+greeting+'</div>';
  if(encouragement) h += '<div style="font-size:11px;color:#3A3A3C;margin-top:3px">'+encouragement+'</div>';
  h += '</div>';
  h += '<button onclick="askCoachForHelp('+mid+')" style="background:'+p.color+';color:#fff;border:none;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;flex-shrink:0">🤖 Mi Coach</button>';
  h += '</div>';
  
  if(priorities.length){
    h += '<div style="font-size:10px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Prioridades de hoy</div>';
    priorities.forEach(function(pr){
      h += '<div style="display:flex;gap:7px;align-items:center;padding:5px 8px;background:'+(pr.urgent?'#FEF2F2':'#fff')+';border:1px solid '+(pr.urgent?'#DC262633':'#E5E5EA')+';border-radius:7px;margin-bottom:3px">';
      h += '<span style="font-size:13px">'+pr.icon+'</span>';
      h += '<span style="font-size:11px;font-weight:'+(pr.urgent?'700':'500')+';color:'+(pr.urgent?'#DC2626':'#1C1C1E')+';line-height:1.3;flex:1">'+pr.text+'</span>';
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}
